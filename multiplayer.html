<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>PINE Tycoon Multiplayer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      touch-action: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #hud {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 40;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      user-select: none;
      pointer-events: none;
      max-width: min(1150px, calc(100vw - 20px));
    }

    #hud .small {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.92;
      margin-top: 3px;
      line-height: 1.45;
    }

    #topBar {
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 45;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      max-width: calc(100vw - 20px);
    }

    .glass {
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #serverInfo {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .top-btn {
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .top-btn:hover { transform: scale(1.04); }

    #minimapWrap {
      position: fixed;
      right: 10px;
      top: 10px;
      z-index: 41;
      width: 140px;
      height: 140px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.70);
      background: rgba(0,0,0,0.25);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      display: none;
    }

    #minimap {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #touchControls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 30;
      display: none;
    }

    #touchControls .pad {
      position: absolute;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0, rgba(0,0,0,0) 60%);
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(2px);
    }

    #movePad { left: 18px; bottom: 28px; }

    #touchControls .stick {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      left: 32px;
      top: 32px;
      background: rgba(46,204,113,0.82);
      box-shadow: 0 0 14px rgba(46,204,113,0.95);
    }

    #actionBtn {
      position: absolute;
      right: 22px;
      bottom: 22px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle, #ffb347 0, #e67e22 60%);
      box-shadow: 0 0 18px rgba(230,126,34,0.95);
      font-size: 36px;
      color: #fff;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
    }

    #errBox,
    #loadingBox {
      position: fixed;
      left: 10px;
      right: 10px;
      z-index: 99;
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.18);
    }

    #errBox {
      background: rgba(120,0,0,0.80);
      display: none;
      bottom: 10px;
      pointer-events: none;
    }

    #loadingBox {
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      background: rgba(0,0,0,0.70);
      max-width: 520px;
      margin: 0 auto;
    }

    #quickChatWheel {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      pointer-events: none;
    }

    #quickChatWheel.show { display: block; }

    #quickChatBackdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.16);
    }

    #quickChatCenter {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 330px;
      height: 330px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
    }

    .chat-option {
      position: absolute;
      width: 98px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.76);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
      transform: translate(-50%, -50%) scale(0.96);
      transition: transform 0.14s ease, background 0.14s ease;
    }

    .chat-option:hover {
      transform: translate(-50%, -50%) scale(1.05);
      background: rgba(255,160,70,0.90);
    }

    #quickChatHint {
      position: absolute;
      left: 50%;
      top: calc(50% + 190px);
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: rgba(0,0,0,0.58);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
    }

    #palettePanel {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 60;
      width: min(500px, calc(100vw - 20px));
      max-height: 56vh;
      overflow-y: auto;
      display: none;
      padding: 12px;
    }

    #palettePanel.show { display: block; }

    #palettePanel h3 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    #palettePanel .hint {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
      gap: 8px;
    }

    .palette-btn {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 10px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      min-height: 54px;
    }

    .palette-btn.active {
      background: rgba(255,170,70,0.95);
      color: #1d1207;
      border-color: rgba(255,230,170,0.90);
    }

    .palette-btn small {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      opacity: 0.85;
      font-weight: 600;
    }

    @media (pointer: coarse) {
      #touchControls { display: block; }
      #minimapWrap { width: 120px; height: 120px; }
      #hud { font-size: 12px; }
      #palettePanel { max-height: 44vh; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="topBar">
    <div id="serverInfo" class="glass">Loading server...</div>
    <button id="leaveBtn" class="top-btn glass">Leave</button>

    <div id="paletteGrid" class="palette-grid"></div>
  </div>

  <script type="module">

      authDomain: "pine-tycoon.firebaseapp.com",

      storageBucket: "pine-tycoon.firebasestorage.app",
      messagingSenderId: "949986190236",

    };

    const DEFAULT_AVATAR = "https://learn.logikaschool.com/uploads/student/4796102/692acc8996fdc.png";
    const app = initializeApp(firebaseConfig);

    const serverId = new URLSearchParams(location.search).get("server");

    const errBox = document.getElementById("errBox");

    const hudEl = document.getElementById("hud");

    const audioBtn = document.getElementById("audioBtn");
    const paletteToggleBtn = document.getElementById("paletteToggleBtn");
    const palettePanel = document.getElementById("palettePanel");
    const paletteGrid = document.getElementById("paletteGrid");

    const mctx = mini.getContext("2d");

    const gctx = gameCanvas.getContext("2d");

    const moveStick = document.getElementById("moveStick");
    const actionBtn = document.getElementById("actionBtn");

    function showErr(msg) {
      errBox.style.display = "block";
      errBox.textContent = String(msg);
      console.error(msg);
    }

    window.addEventListener("error", (e) => showErr("JS ERROR:\n" + (e.message || e.error || e)));
    window.addEventListener("unhandledrejection", (e) => showErr("PROMISE ERROR:\n" + (e.reason?.message || e.reason || e)));

    const QUICK_CHAT_MESSAGES = ["Hello!", "Bye!", "How are you?", "Follow me!", "Need help!", "Thanks!", "Sorry!", "Good luck!", ";)", ":D", ":(", ":3"];
    const PLAYER_TIMEOUT_MS = 10000;
    const SERVER_TIMEOUT_MS = 12000;
    const QUICK_CHAT_VISIBLE_MS = 4000;
    const CLAIM_SIZE = 16;
    const TELEPORT_COOLDOWN_MS = 1200;

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
    const rgba = (r, g, b, a) => `rgba(${r},${g},${b},${a})`;
    function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
    function normalizeName(name) { return String(name || "").trim().toLowerCase().replace(/\s+/g, "_"); }
    function getTimestampMs(ts) { return ts?.toDate ? ts.toDate().getTime() : 0; }
    function getIsFresh(ts, timeout) { const ms = getTimestampMs(ts); return !!(ms && Date.now() - ms < timeout); }

    async function resolveUserName(user) {
      if (!user) return null;
      const authName = String(user.displayName || "").trim();
      if (authName) return authName;
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        const dbName = snap.exists() ? String(snap.data()?.name || "").trim() : "";
        if (dbName) return dbName;
      } catch (e) {
        console.error("resolveUserName error:", e);
      }
      const emailName = String(user.email || "").split("@")[0].trim();
      return emailName || "Player";
    }

    const audio = {
      ctx: null,
      muted: true,
      ensure() {
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ctx = new AC();
      },
      resume() {
        this.ensure();
        if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
      },
      beep(freq = 440, dur = 0.08, vol = 0.03) {
        if (this.muted) return;
        this.resume();
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + dur);
      },
      toggle() {
        this.muted = !this.muted;
        if (!this.muted) this.beep(700, 0.06, 0.04);
        audioBtn.textContent = this.muted ? "Audio: Off" : "Audio: On";
      }
    };

    audioBtn.addEventListener("click", () => audio.toggle());
    window.addEventListener("pointerdown", () => audio.resume(), { once: true, capture: true });
    window.addEventListener("keydown", () => audio.resume(), { once: true, capture: true });

    const isCoarse = matchMedia("(pointer:coarse)").matches;
    const INTERNAL_W = 512;
    const INTERNAL_H = 288;
    const buffer = document.createElement("canvas");
    buffer.width = INTERNAL_W;
    buffer.height = INTERNAL_H;
    const bctx = buffer.getContext("2d");
    bctx.imageSmoothingEnabled = false;
    gctx.imageSmoothingEnabled = false;

    const view = { scale: 1, ox: 0, oy: 0 };
    const PPU = 16;
    const WORLD_HALF = 160;
    const WORLD_SIZE = WORLD_HALF * 2;

    const T = { WATER: 0, SAND: 1, GRASS: 2, HILL: 3, ROCK: 4 };
    const BUILD = { FLOOR: "floor", WALL: "wall", DOOR: "door", WINDOW: "window", ROOF: "roof" };
    const TOOL = { AXE: 0, PICKAXE: 1 };
    const COST = { floor: 1, wall: 2, door: 3, window: 3, roof: 2 };

    const tileMap = new Uint8Array(WORLD_SIZE * WORLD_SIZE);
    const heightMap = new Float32Array(WORLD_SIZE * WORLD_SIZE);
    const moistMap = new Float32Array(WORLD_SIZE * WORLD_SIZE);
    const riverMask = new Uint8Array(WORLD_SIZE * WORLD_SIZE);

    function idxOf(tx, ty) { return ty * WORLD_SIZE + tx; }
    function inBounds(tx, ty) { return tx >= 0 && ty >= 0 && tx < WORLD_SIZE && ty < WORLD_SIZE; }
    function worldToTile(wx) { return Math.floor(wx + WORLD_HALF); }
    function tileToWorld(tx) { return (tx - WORLD_HALF) + 0.5; }
    function claimKey(chunkX, chunkY) { return `${chunkX}_${chunkY}`; }
    function getChunkFromTile(tx, ty) { return { chunkX: Math.floor(tx / CLAIM_SIZE), chunkY: Math.floor(ty / CLAIM_SIZE) }; }

    function getChunkWorldRect(chunkX, chunkY) {
      const startTx = chunkX * CLAIM_SIZE;
      const startTy = chunkY * CLAIM_SIZE;
      const endTx = startTx + CLAIM_SIZE - 1;
      const endTy = startTy + CLAIM_SIZE - 1;
      return {
        x1: tileToWorld(startTx) - 0.5,
        y1: tileToWorld(startTy) - 0.5,
        x2: tileToWorld(endTx) + 0.5,
        y2: tileToWorld(endTy) + 0.5,
      };
    }

    const colliders = [];
    function addColliderRect(x, y, hw, hh, tag = "") {
      const r = { x, y, hw, hh, tag };
      colliders.push(r);
      return r;
    }

    function circleRectCollide(px, py, pr, r) {
      const cx = clamp(px, r.x - r.hw, r.x + r.hw);
      const cy = clamp(py, r.y - r.hh, r.y + r.hh);
      const dx = px - cx, dy = py - cy;
      return dx * dx + dy * dy <= pr * pr;
    }

    function isBlocked(px, py, pr) {
      return colliders.some((r) => circleRectCollide(px, py, pr, r));
    }

    function tileOccupiedByCollider(wx, wy, pad = 0.48) {
      for (const r of colliders) {
        if (Math.abs(r.x - wx) < r.hw + pad && Math.abs(r.y - wy) < r.hh + pad) return true;
      }
      return false;
    }

    function xmur3(str) {
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = (h << 13) | (h >>> 19);
      }
      return function () {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        h ^= h >>> 16;
        return h >>> 0;
      };
    }

    function mulberry32(a) {
      return function () {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function fade(t) { return t * t * (3 - 2 * t); }

    function hash2(ix, iy, seedU32) {
      let h = seedU32 ^ (ix * 374761393) ^ (iy * 668265263);
      h = Math.imul(h ^ (h >>> 13), 1274126177);
      h ^= (h >>> 16);
      return (h >>> 0) / 4294967296;
    }

    function valueNoise2D(x, y, seedU32) {
      const x0 = Math.floor(x), y0 = Math.floor(y);
      const x1 = x0 + 1, y1 = y0 + 1;
      const sx = fade(x - x0);
      const sy = fade(y - y0);
      const n00 = hash2(x0, y0, seedU32);
      const n10 = hash2(x1, y0, seedU32);
      const n01 = hash2(x0, y1, seedU32);
      const n11 = hash2(x1, y1, seedU32);
      const ix0 = lerp(n00, n10, sx);
      const ix1 = lerp(n01, n11, sx);
      return lerp(ix0, ix1, sy);
    }

    function fbm(x, y, seedU32, oct = 5) {
      let v = 0, amp = 0.55, freq = 1, norm = 0;
      for (let i = 0; i < oct; i++) {
        v += valueNoise2D(x * freq, y * freq, seedU32 + i * 1013) * amp;
        norm += amp;
        amp *= 0.55;
        freq *= 2;
      }
      return v / norm;
    }

    let seedStr = "";
    let seedU32 = 0;
    let rng = Math.random;

    function setSeed(str) {
      seedStr = str;
      const seedFn = xmur3(seedStr);
      seedU32 = seedFn();
      rng = mulberry32(seedU32);
    }

    let trees = [];
    let boulders = [];
    let particles = [];
    let terrainLayerMap = new Map();
    let structureLayerMap = new Map();
    let objectLayerMap = new Map();
    let removedTrees = new Set();
    let removedBoulders = new Set();
    let claimsMap = new Map();

    const campfire = { x: 0, y: 0 };

    const player = {
      x: 0,
      y: 0,
      r: 0.60,
      dir: 0,
      attack: 0,
      attackCooldown: 0,
      name: "You",
      avatar: DEFAULT_AVATAR,
      quickChatText: "",
      quickChatUntil: 0,
    };

    const camera = { x: 0, y: 0 };

    let wood = 0;
    let stone = 0;
    let coal = 0;
    let currentTool = TOOL.AXE;
    let buildMode = false;
    let selectedPaletteKey = "wall";
    let selectedBuild = { key: "wall", layer: "structure", type: BUILD.WALL, label: "Wall", rot: 0 };
    let minimapOn = false;
    let minimapDirty = true;
    let minimapTimer = 0;
    let quickChatOpen = false;
    let claimPreviewActive = false;
    let paletteOpen = false;
    let lastTeleportAt = 0;

    const toast = { text: "", t: 0 };

    const PALETTE_ITEMS = [
      { key: "floor", layer: "structure", type: "floor", label: "Floor", info: "classic" },
      { key: "wall", layer: "structure", type: "wall", label: "Wall", info: "classic" },
      { key: "door", layer: "structure", type: "door", label: "Door", info: "classic" },
      { key: "window", layer: "structure", type: "window", label: "Window", info: "classic" },
      { key: "roof", layer: "structure", type: "roof", label: "Roof", info: "classic" },
      { key: "road", layer: "terrain", type: "road", label: "Road", info: "city" },
      { key: "stoneground", layer: "terrain", type: "stoneground", label: "Stone", info: "paint" },
      { key: "grassgreen", layer: "terrain", type: "grassgreen", label: "Green", info: "paint" },
      { key: "grassdark", layer: "terrain", type: "grassdark", label: "Dark Grass", info: "paint" },
      { key: "sandpaint", layer: "terrain", type: "sandpaint", label: "Sand", info: "paint" },
      { key: "redpaint", layer: "terrain", type: "redpaint", label: "Red", info: "paint" },
      { key: "bluepaint", layer: "terrain", type: "bluepaint", label: "Blue", info: "paint" },
      { key: "whitepaint", layer: "terrain", type: "whitepaint", label: "White", info: "paint" },
      { key: "blackpaint", layer: "terrain", type: "blackpaint", label: "Black", info: "paint" },
      { key: "water_tile", layer: "terrain", type: "water_tile", label: "Water", info: "terrain" },
      { key: "tree_object", layer: "object", type: "tree_object", label: "Tree", info: "spawn" },
      { key: "campfire_object", layer: "object", type: "campfire_object", label: "Campfire", info: "spawn" },
      { key: "teleporter_spawn", layer: "object", type: "teleporter_spawn", label: "Spawn TP", info: "teleport" },
    ];

    function getPaletteItemByKey(key) {
      return PALETTE_ITEMS.find((x) => x.key === key) || PALETTE_ITEMS[1];
    }

    function applySelectedPalette(key) {
      const item = getPaletteItemByKey(key);
      selectedPaletteKey = item.key;
      selectedBuild = { ...item, rot: selectedBuild.rot || 0 };
      renderPaletteButtons();
    }

    function renderPaletteButtons() {
      paletteGrid.innerHTML = "";
      PALETTE_ITEMS.forEach((item) => {
        const btn = document.createElement("button");
        btn.className = "palette-btn" + (item.key === selectedPaletteKey ? " active" : "");
        btn.innerHTML = `${item.label}<small>${item.info}</small>`;
        btn.addEventListener("click", () => {
          applySelectedPalette(item.key);
          buildMode = true;
        });
        paletteGrid.appendChild(btn);
      });
    }

    renderPaletteButtons();

    function openPalette() {
      if (!hasAdvancedBuilderAccess()) return;
      paletteOpen = true;
      palettePanel.classList.add("show");
    }

    function closePalette() {
      paletteOpen = false;
      palettePanel.classList.remove("show");

    function togglePalette() {
      if (!hasAdvancedBuilderAccess()) return;
      if (paletteOpen) closePalette();
      else openPalette();
    }

    paletteToggleBtn.addEventListener("click", () => togglePalette());

    let serverMeta = null;
    let myUid = null;
    let myName = null;
    let myAvatar = DEFAULT_AVATAR;
    let worldReady = false;
    let canPlay = false;
    let joinedPresence = false;
    let leaveDone = false;
    let actualPlayersCount = 0;
    let remotePlayers = [];
    const remotePlayersMap = new Map();

    let unsubServer = null;
    let unsubPlayers = null;
    let unsubBuilds = null;
    let unsubRemovedTrees = null;
    let unsubRemovedBoulders = null;
    let unsubClaims = null;

    let lastNetSendAt = 0;
    let lastHeartbeatAt = 0;
    let lastServerSyncAt = 0;
    let lastSentX = 99999;
    let lastSentY = 99999;
    let lastSentDir = 99999;

    function getGameplay() {
      const gp = serverMeta?.gameplay || {};
      return {
        creativeEnabled: gp.creativeEnabled === true,
        creativeAccess: ["owner", "selected", "all"].includes(gp.creativeAccess) ? gp.creativeAccess : "owner",
        creativeUsersNormalized: Array.isArray(gp.creativeUsersNormalized) ? gp.creativeUsersNormalized : [],
        canBreakBlocks: gp.canBreakBlocks !== false,
        giveAxe: gp.giveAxe !== false,
        claimsEnabled: gp.claimsEnabled !== false,
        builderUsersNormalized: Array.isArray(gp.builderUsersNormalized) ? gp.builderUsersNormalized : [],
      };
    }

    function isOwner() {
      return !!(serverMeta && myUid && serverMeta.createdByUid === myUid);
    }

    function isCreativeForMe() {
      const gp = getGameplay();
      if (!gp.creativeEnabled) return false;
      if (isOwner()) return true;
      if (gp.creativeAccess === "all") return true;
      if (gp.creativeAccess === "selected") return gp.creativeUsersNormalized.includes(normalizeName(myName));
      return false;
    }

    function isListedBuilder() {
      return getGameplay().builderUsersNormalized.includes(normalizeName(myName));
    }

    function hasAdvancedBuilderAccess() {
      return isOwner() || isCreativeForMe() || isListedBuilder();
    }

    function canBuildServerWide() {
      if (hasAdvancedBuilderAccess()) return true;
      const gp = getGameplay();
      if (gp.builderUsersNormalized.length > 0) return false;
      return true;
    }

    function canBreakServerWide() {
      if (hasAdvancedBuilderAccess()) return true;
      return getGameplay().canBreakBlocks !== false && canBuildServerWide();
    }

    function claimsAreEnabled() {
      return getGameplay().claimsEnabled !== false;
    }

    function hasAxeAccess() {
      if (hasAdvancedBuilderAccess()) return true;
      return getGameplay().giveAxe !== false;
    }

    function isFreeBuildForMe() {
      return hasAdvancedBuilderAccess();
    }

    function updateServerInfo() {
      if (!serverMeta) {
        serverInfoEl.textContent = "Loading server...";
        return;
      }
      const online = getIsFresh(serverMeta.lastHeartbeat, SERVER_TIMEOUT_MS);
      const role = isCreativeForMe() ? "Creative" : hasAdvancedBuilderAccess() ? "Builder+" : "Survival";
      serverInfoEl.textContent = `${serverMeta.name || "Server"} • by ${serverMeta.createdByName || "Unknown"} • ${online ? "Online" : "Offline"} • Players: ${actualPlayersCount}/${serverMeta.maxPlayers || 8} • ${role}`;
    }

    function getServerLight(nowMs) {
      if (!serverMeta) return 1;
      if (serverMeta.dayMode === "dayForever") return 1;
      if (serverMeta.dayMode === "nightForever") return 0;
      const SWITCH_EVERY = 180000;
      const TRANSITION = 12000;
      const start = getTimestampMs(serverMeta.createdAt) || Date.now();
      const elapsed = Math.max(0, nowMs - start);
      const phaseIndex = Math.floor(elapsed / SWITCH_EVERY);
      const phaseTime = elapsed % SWITCH_EVERY;
      const phaseIsNight = phaseIndex % 2 === 1;
      if (phaseTime < TRANSITION) {
        const t = easeOutQuint(phaseTime / TRANSITION);
        const from = phaseIsNight ? 1 : 0;
        const to = phaseIsNight ? 0 : 1;
        return lerp(from, to, t);
      }
      return phaseIsNight ? 0 : 1;
    }

    function clearWorldGeometry() {
      colliders.length = 0;
      trees = [];
      boulders = [];
      particles = [];
      riverMask.fill(0);
    }

    function classifyTiles() {
      for (let ty = 0; ty < WORLD_SIZE; ty++) {
        for (let tx = 0; tx < WORLD_SIZE; tx++) {
          const id = idxOf(tx, ty);
          const h = heightMap[id];
          let tt = T.GRASS;
          if (h < 0.24) tt = T.WATER;
          else if (h < 0.29) tt = T.SAND;
          else if (h < 0.72) tt = T.GRASS;
          else if (h < 0.84) tt = T.HILL;
          else tt = T.ROCK;
          tileMap[id] = tt;
        }
      }
    }

    function buildBaseNoise() {
      const ox = rng() * 1000, oy = rng() * 1000;
      const mx = rng() * 1000, my = rng() * 1000;
      const elevScale = 0.045;
      const moistScale = 0.060;
      for (let ty = 0; ty < WORLD_SIZE; ty++) {
        for (let tx = 0; tx < WORLD_SIZE; tx++) {
          const wx = tx - WORLD_HALF;
          const wy = ty - WORLD_HALF;
          const nx = wx * elevScale + ox;
          const ny = wy * elevScale + oy;
          let h = fbm(nx, ny, seedU32, 5);
          const r = Math.sqrt(wx * wx + wy * wy) / WORLD_HALF;
          const edge = clamp(1 - (r * r) * 0.85, 0, 1);
          h = h * 0.90 + edge * 0.18;
          h = clamp(h, 0, 1);
          const mnx = wx * moistScale + mx;
          const mny = wy * moistScale + my;
          const m = fbm(mnx, mny, seedU32 + 99991, 4);
          heightMap[idxOf(tx, ty)] = h;
          moistMap[idxOf(tx, ty)] = m;
        }
      }
    }

    function carveRivers() {
      const flow = new Uint16Array(WORLD_SIZE * WORLD_SIZE);
      function lowestNeighbor(tx, ty) {
        let bestTx = tx, bestTy = ty;
        let bestH = heightMap[idxOf(tx, ty)];
        for (let oy = -1; oy <= 1; oy++) {
          for (let ox = -1; ox <= 1; ox++) {
            if (ox === 0 && oy === 0) continue;
            const nx = tx + ox, ny = ty + oy;
            if (!inBounds(nx, ny)) continue;
            const nh = heightMap[idxOf(nx, ny)];
            if (nh < bestH) {
              bestH = nh;
              bestTx = nx;
              bestTy = ny;
            }
          }
        }
        return { tx: bestTx, ty: bestTy };
      }

      const sources = [];
      for (let i = 0, tries = 0; i < 10 && tries < 5000; tries++) {
        const tx = 10 + ((rng() * (WORLD_SIZE - 20)) | 0);
        const ty = 10 + ((rng() * (WORLD_SIZE - 20)) | 0);
        const id = idxOf(tx, ty);
        const h = heightMap[id];
        const m = moistMap[id];
        if (h < 0.74 || tileMap[id] === T.ROCK || m < 0.42) continue;
        sources.push({ tx, ty });
        i++;
      }

      for (const s of sources) {
        let tx = s.tx, ty = s.ty;
        const visited = new Set();
        for (let step = 0; step < 2400; step++) {
          const id = idxOf(tx, ty);
          flow[id] = Math.min(65535, flow[id] + 25);
          if (heightMap[id] < 0.26) break;
          const key = (tx << 16) | ty;
          if (visited.has(key)) break;
          visited.add(key);
          const nb = lowestNeighbor(tx, ty);
          if (nb.tx === tx && nb.ty === ty) break;
          tx = nb.tx;
          ty = nb.ty;
        }
      }

      for (let ty = 1; ty < WORLD_SIZE - 1; ty++) {
        for (let tx = 1; tx < WORLD_SIZE - 1; tx++) {
          const id = idxOf(tx, ty);
          const f = flow[id];
          if (f < 60) continue;
          let w = 1;
          if (f > 220) w = 2;
          if (f > 520) w = 3;
          for (let oy = -w; oy <= w; oy++) {
            for (let ox = -w; ox <= w; ox++) {
              const nx = tx + ox, ny = ty + oy;
              if (!inBounds(nx, ny)) continue;
              if (ox * ox + oy * oy > w * w) continue;
              const nid = idxOf(nx, ny);
              if (heightMap[nid] > 0.94) continue;
              riverMask[nid] = 1;
            }
          }
        }
      }

      for (let i = 0; i < tileMap.length; i++) if (riverMask[i]) tileMap[i] = T.WATER;

      for (let ty = 1; ty < WORLD_SIZE - 1; ty++) {
        for (let tx = 1; tx < WORLD_SIZE - 1; tx++) {
          const id = idxOf(tx, ty);
          if (tileMap[id] === T.WATER) continue;
          let nearWater = false;
          for (let oy = -1; oy <= 1; oy++) {
            for (let ox = -1; ox <= 1; ox++) {
              if (ox === 0 && oy === 0) continue;
              const nx = tx + ox, ny = ty + oy;
              if (!inBounds(nx, ny)) continue;
              if (tileMap[idxOf(nx, ny)] === T.WATER) { nearWater = true; break; }
            }
            if (nearWater) break;
          }
          if (nearWater && heightMap[id] < 0.34) tileMap[id] = T.SAND;
        }
      }
    }

    function pickCampfireSpot() {
      let best = { tx: WORLD_HALF, ty: WORLD_HALF, score: -1 };
      for (let tries = 0; tries < 2500; tries++) {
        const wx = (rng() * 2 - 1) * 40;
        const wy = (rng() * 2 - 1) * 40;
        const tx = worldToTile(wx);
        const ty = worldToTile(wy);
        if (!inBounds(tx, ty)) continue;
        const id = idxOf(tx, ty);
        const tt = tileMap[id];
        if (tt === T.WATER) continue;
        const h = heightMap[id];
        const m = moistMap[id];
        let nearWater = 0;
        for (let oy = -2; oy <= 2; oy++) {
          for (let ox = -2; ox <= 2; ox++) {
            const nx = tx + ox, ny = ty + oy;
            if (!inBounds(nx, ny)) continue;
            if (tileMap[idxOf(nx, ny)] === T.WATER) nearWater++;
          }
        }
        const score = (tt === T.GRASS ? 2.0 : 1.0) + (m * 1.4) + (nearWater * 0.03) + (1.0 - Math.abs(h - 0.55)) * 0.6;
        if (score > best.score) best = { tx, ty, score };
      }
      campfire.x = tileToWorld(best.tx);
      campfire.y = tileToWorld(best.ty);
    }

    function nearCamp(wx, wy) {
      return dist2(wx, wy, campfire.x, campfire.y) < 14 * 14;
    }

    function createTreeAtTile(tx, ty) {
      const tileId = idxOf(tx, ty);
      const wx = tileToWorld(tx);
      const wy = tileToWorld(ty);
      const jx = (hash2(tx, ty, seedU32 + 7) - 0.5) * 0.35;
      const jy = (hash2(tx, ty, seedU32 + 9) - 0.5) * 0.35;
      const kindRoll = hash2(tx, ty, seedU32 + 17);
      const kind = kindRoll < 0.58 ? 0 : kindRoll < 0.88 ? 1 : 2;
      const scale = 0.90 + hash2(tx, ty, seedU32 + 19) * 0.55;
      const trunk = 0.90 + hash2(tx, ty, seedU32 + 23) * 0.70;
      const hueVar = hash2(tx, ty, seedU32 + 29);
      const baseHP = 3 + (hash2(tx, ty, seedU32 + 31) < 0.25 ? 1 : 0);
      const x = wx + jx;
      const y = wy + jy;
      trees.push({
        tileId, x, y, hp: baseHP, removed: false, kind, scale, trunk, hueVar,
        sway: hash2(tx, ty, seedU32 + 41) * Math.PI * 2,
        collider: addColliderRect(x, y, 0.80, 0.80, "tree"),
      });
    }

    function createBoulderAtTile(tx, ty, type) {
      const tileId = idxOf(tx, ty);
      const wx = tileToWorld(tx);
      const wy = tileToWorld(ty);
      const jx = (hash2(tx, ty, seedU32 + 111) - 0.5) * 0.28;
      const jy = (hash2(tx, ty, seedU32 + 113) - 0.5) * 0.28;
      const size = type === "coal" ? 0.95 + hash2(tx, ty, seedU32 + 115) * 1.2 : 0.80 + hash2(tx, ty, seedU32 + 117) * 1.1;
      const hp = type === "coal" ? 4 : 3;
      const x = wx + jx;
      const y = wy + jy;
      boulders.push({
        tileId, x, y, size, hp, type, removed: false,
        collider: addColliderRect(x, y, size * 0.80, size * 0.80, "boulder"),
      });
    }

    function rebuildBuildColliders() {
      for (let i = colliders.length - 1; i >= 0; i--) {
        const tag = colliders[i].tag || "";
        if (tag.startsWith("layer_")) colliders.splice(i, 1);
      }

      structureLayerMap.forEach((v, tileId) => {
        if (v.type !== BUILD.WALL && v.type !== BUILD.WINDOW) return;
        const tx = tileId % WORLD_SIZE;
        const ty = (tileId / WORLD_SIZE) | 0;
        addColliderRect(tileToWorld(tx), tileToWorld(ty), 0.48, 0.48, `layer_structure_${v.type}`);
      });

      objectLayerMap.forEach((v, tileId) => {
        const tx = tileId % WORLD_SIZE;
        const ty = (tileId / WORLD_SIZE) | 0;
        const wx = tileToWorld(tx);
        const wy = tileToWorld(ty);
        if (v.type === "tree_object") addColliderRect(wx, wy, 0.80, 0.80, "layer_object_tree");
        if (v.type === "campfire_object") addColliderRect(wx, wy, 0.45, 0.45, "layer_object_campfire");
      });
    }

    function spawnDecor() {
      trees = [];
      boulders = [];
      colliders.length = 0;
      for (let ty = 1; ty < WORLD_SIZE - 1; ty++) {
        for (let tx = 1; tx < WORLD_SIZE - 1; tx++) {
          const id = idxOf(tx, ty);
          const tt = tileMap[id];
          const h = heightMap[id];
          const m = moistMap[id];
          const wx = tileToWorld(tx);
          const wy = tileToWorld(ty);
          if (nearCamp(wx, wy)) continue;
          if (tt === T.GRASS || tt === T.HILL) {
            const forest = clamp((m - 0.45) * 1.6, 0, 1);
            const hillPenalty = tt === T.HILL ? 0.55 : 1.0;
            const chance = 0.14 * forest * hillPenalty;
            if (hash2(tx, ty, seedU32 + 424242) < chance) createTreeAtTile(tx, ty);
          }
          if (tt === T.HILL || tt === T.ROCK) {
            const rocky = tt === T.ROCK ? 1.0 : clamp((h - 0.70) * 2.0, 0, 1);
            if (hash2(tx, ty, seedU32 + 888888) < 0.060 * rocky) {
              const coalChance = (tt === T.ROCK ? 0.35 : 0.18) * (0.50 + 0.50 * rocky);
              const isCoal = hash2(tx, ty, seedU32 + 999001) < coalChance;
              createBoulderAtTile(tx, ty, isCoal ? "coal" : "stone");
            }
          }
        }
      }
      rebuildBuildColliders();
    }

    function applyRemovedTreeSet() {
      for (const t of trees) {
        if (removedTrees.has(t.tileId) && !t.removed) {
          t.removed = true;
          const i = colliders.indexOf(t.collider);
          if (i !== -1) colliders.splice(i, 1);
        }
      }
    }

    function applyRemovedBoulderSet() {
      for (const b of boulders) {
        if (removedBoulders.has(b.tileId) && !b.removed) {
          b.removed = true;
          const i = colliders.indexOf(b.collider);
          if (i !== -1) colliders.splice(i, 1);
        }
      }
    }

    function generateWorld() {
      clearWorldGeometry();
      buildBaseNoise();
      classifyTiles();
      carveRivers();
      pickCampfireSpot();
      spawnDecor();
      applyRemovedTreeSet();
      applyRemovedBoulderSet();
      rebuildBuildColliders();
      minimapDirty = true;
    }

    function getTerrainEntry(tileId) { return terrainLayerMap.get(tileId) || null; }
    function getStructureEntry(tileId) { return structureLayerMap.get(tileId) || null; }
    function getObjectEntry(tileId) { return objectLayerMap.get(tileId) || null; }
    function getBaseTileType(tileId) { return tileMap[tileId]; }

    function getVisualTerrainType(tileId) {
      const t = getTerrainEntry(tileId);
      if (!t) return getBaseTileType(tileId);
      if (t.type === "water_tile") return T.WATER;
      if (t.type === "sandpaint") return T.SAND;
      if (t.type === "road" || t.type === "stoneground" || t.type === "blackpaint" || t.type === "whitepaint") return T.ROCK;
      return T.GRASS;
    }

    function isWaterTile(tileId) {
      const t = getTerrainEntry(tileId);
      if (t) return t.type === "water_tile";
      return getBaseTileType(tileId) === T.WATER;
    }

    function isCampfireRemoved() {
      return serverMeta?.campfireRemoved === true;
    }

    function terrainOverrideColor(type, light) {
      const day = 0.62 + 0.38 * light;
      const map = {
        road: [95, 95, 100],
        stoneground: [135, 138, 145],
        grassgreen: [65, 175, 78],
        grassdark: [42, 105, 52],
        sandpaint: [210, 190, 120],
        redpaint: [175, 60, 60],
        bluepaint: [60, 110, 190],
        whitepaint: [225, 225, 225],
        blackpaint: [35, 35, 38],
        water_tile: [28, 96, 180],
      };
      const v = map[type] || [120, 120, 120];
      return rgba((v[0] * day) | 0, (v[1] * day) | 0, (v[2] * day) | 0, type === "water_tile" ? 0.72 : 1);
    }

    function tileColor(tileId, h, m, time, tx, ty, light) {
      const terrainEntry = getTerrainEntry(tileId);
      if (terrainEntry) return terrainOverrideColor(terrainEntry.type, light);
      const tt = getBaseTileType(tileId);
      const day = 0.62 + 0.38 * light;
      if (tt === T.WATER) {
        const depth = clamp((0.28 - h) * 4.0, 0, 1);
        const wave = 0.06 * Math.sin(time * 2.2 + tx * 0.35 + ty * 0.22) + 0.04 * Math.sin(time * 3.1 + tx * 0.18 - ty * 0.29);
        const baseR = lerp(18, 24, 1 - depth);
        const baseG = lerp(70, 125, 1 - depth);
        const baseB = lerp(125, 185, 1 - depth);
        const a = clamp(0.62 + wave, 0.50, 0.75);
        return rgba((baseR * day) | 0, (baseG * day) | 0, (baseB * day) | 0, a);
      }
      if (tt === T.SAND) return rgba((205 * day) | 0, (190 * day) | 0, (120 * day) | 0, 1);
      if (tt === T.GRASS) {
        const wet = clamp((m - 0.40) * 1.3, 0, 1);
        const r = 35 + (wet * 10) | 0;
        const g = 150 + (wet * 35) | 0;
        const b = 45 + (wet * 12) | 0;
        return rgba((r * day) | 0, (g * day) | 0, (b * day) | 0, 1);
      }
      if (tt === T.HILL) return rgba((70 * day) | 0, (135 * day) | 0, (70 * day) | 0, 1);
      return rgba((110 * day) | 0, (112 * day) | 0, (120 * day) | 0, 1);
    }

    function drawTerrain(ctx, time, light) {
      const halfW = INTERNAL_W / (2 * PPU);
      const halfH = INTERNAL_H / (2 * PPU);
      const minX = Math.floor(camera.x - halfW - 2);
      const maxX = Math.floor(camera.x + halfW + 2);
      const minY = Math.floor(camera.y - halfH - 2);
      const maxY = Math.floor(camera.y + halfH + 2);
      for (let wy = minY; wy <= maxY; wy++) {
        for (let wx = minX; wx <= maxX; wx++) {
          const tx = worldToTile(wx);
          const ty = worldToTile(wy);
          if (!inBounds(tx, ty)) continue;
          const id = idxOf(tx, ty);
          const pos = worldToScreen(wx, wy);
          ctx.fillStyle = tileColor(id, heightMap[id], moistMap[id], time, tx, ty, light);
          pRect(ctx, pos.x, pos.y, PPU + 1, PPU + 1);
          const terrainEntry = getTerrainEntry(id);
          if (terrainEntry?.type === "road") {
            ctx.fillStyle = "rgba(255,255,255,0.08)";
            pRect(ctx, pos.x, pos.y + 7, PPU + 1, 2);
          }
          const speck = hash2(tx, ty, seedU32 + 12345);
          if (!terrainEntry && (getBaseTileType(id) === T.GRASS || getBaseTileType(id) === T.HILL) && speck < 0.35) {
            ctx.fillStyle = "rgba(0,0,0,0.06)";
            pRect(ctx, pos.x + ((speck * 11) | 0), pos.y + (((speck * 19) | 0) % 12), 2, 2);
          }
        }
      }
    }

    function drawNaturalTree(ctx, t, time, light) {
      const pos = worldToScreen(t.x, t.y);
      const s = t.scale;
      const trunkH = PPU * (1.05 * t.trunk) * s;
      drawShadowCircle(ctx, pos.x, pos.y + PPU * 0.40, PPU * 0.78 * s);
      const sway = Math.sin(time * 1.6 + t.sway) * 0.06;
      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.translate(0, PPU * 0.25 * s);
      ctx.rotate(sway);
      ctx.translate(0, -PPU * 0.25 * s);
      ctx.fillStyle = "#6b4625";
      pRect(ctx, -2 * s, -trunkH * 0.10, 4 * s, trunkH);
      const hv = t.hueVar;
      const base = { r: (22 + hv * 22) | 0, g: (110 + hv * 70) | 0, b: (30 + hv * 18) | 0 };
      const hi = { r: (40 + hv * 22) | 0, g: (165 + hv * 60) | 0, b: (55 + hv * 20) | 0 };
      const deep = { r: (16 + hv * 12) | 0, g: (85 + hv * 55) | 0, b: (22 + hv * 12) | 0 };
      const dayMul = 0.62 + 0.38 * light;
      const cBase = rgba((base.r * dayMul) | 0, (base.g * dayMul) | 0, (base.b * dayMul) | 0, 0.98);
      const cHi = rgba((hi.r * dayMul) | 0, (hi.g * dayMul) | 0, (hi.b * dayMul) | 0, 0.45);
      const cDeep = rgba((deep.r * dayMul) | 0, (deep.g * dayMul) | 0, (deep.b * dayMul) | 0, 0.98);
      function tri(topY, baseY, w, col) {
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(0, topY);
        ctx.lineTo(w, baseY);
        ctx.lineTo(-w, baseY);
        ctx.closePath();
        ctx.fill();
      }
      function blob(cx, cy, rx, ry, col) {
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      if (t.kind === 0 || t.kind === 2) {
        const tall = t.kind === 2 ? 1.14 : 1.0;
        tri(-PPU * 1.70 * s * tall, -PPU * 0.15 * s, PPU * 1.05 * s, cDeep);
        tri(-PPU * 1.25 * s * tall, -PPU * 0.35 * s, PPU * 0.88 * s, cDeep);
        tri(-PPU * 0.85 * s * tall, -PPU * 0.55 * s, PPU * 0.72 * s, cDeep);
        tri(-PPU * 1.60 * s * tall, -PPU * 0.15 * s, PPU * 0.92 * s, cBase);
        tri(-PPU * 1.15 * s * tall, -PPU * 0.35 * s, PPU * 0.78 * s, cBase);
        tri(-PPU * 0.75 * s * tall, -PPU * 0.55 * s, PPU * 0.62 * s, cBase);
        tri(-PPU * 1.48 * s * tall, -PPU * 0.20 * s, PPU * 0.55 * s, cHi);
      } else {
        blob(0, -PPU * 1.40 * s, PPU * 0.70 * s, PPU * 0.55 * s, cBase);
        blob(-PPU * 0.40 * s, -PPU * 0.95 * s, PPU * 0.85 * s, PPU * 0.65 * s, cBase);
        blob(PPU * 0.42 * s, -PPU * 0.95 * s, PPU * 0.85 * s, PPU * 0.65 * s, cBase);
        blob(0, -PPU * 0.55 * s, PPU * 1.10 * s, PPU * 0.78 * s, cDeep);
        blob(-PPU * 0.30 * s, -PPU * 1.25 * s, PPU * 0.42 * s, PPU * 0.32 * s, cHi);
        blob(PPU * 0.25 * s, -PPU * 1.00 * s, PPU * 0.55 * s, PPU * 0.40 * s, cHi);
      }
      ctx.restore();
    }

    function drawCustomObjectTree(ctx, tileId, light) {
      const tx = tileId % WORLD_SIZE;
      const ty = (tileId / WORLD_SIZE) | 0;
      const pos = worldToScreen(tileToWorld(tx), tileToWorld(ty));
      drawShadowCircle(ctx, pos.x, pos.y + 7, 12);
      ctx.fillStyle = "#6b4625";
      pRect(ctx, pos.x - 2, pos.y - 2, 4, 14);
      const dayMul = 0.62 + 0.38 * light;
      ctx.fillStyle = rgba((30 * dayMul) | 0, (125 * dayMul) | 0, (44 * dayMul) | 0, 0.98);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 20);
      ctx.lineTo(pos.x + 14, pos.y + 2);
      ctx.lineTo(pos.x - 14, pos.y + 2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 12);
      ctx.lineTo(pos.x + 11, pos.y + 10);
      ctx.lineTo(pos.x - 11, pos.y + 10);
      ctx.closePath();
      ctx.fill();
    }

    function drawBoulder(ctx, b, light) {
      const pos = worldToScreen(b.x, b.y);
      const s = b.size * PPU;
      drawShadowCircle(ctx, pos.x, pos.y + s * 0.24, s * 0.55);
      const dayMul = 0.62 + 0.38 * light;
      ctx.fillStyle = b.type === "coal" ? rgba((50 * dayMul) | 0, (52 * dayMul) | 0, (60 * dayMul) | 0, 0.96) : rgba((92 * dayMul) | 0, (95 * dayMul) | 0, (105 * dayMul) | 0, 0.96);
      ctx.beginPath();
      ctx.moveTo(pos.x - s * 0.60, pos.y);
      ctx.lineTo(pos.x - s * 0.15, pos.y - s * 0.50);
      ctx.lineTo(pos.x + s * 0.55, pos.y - s * 0.15);
      ctx.lineTo(pos.x + s * 0.35, pos.y + s * 0.52);
      ctx.lineTo(pos.x - s * 0.38, pos.y + s * 0.45);
      ctx.closePath();
      ctx.fill();
    }

    function drawCampfire(ctx, wx, wy, time, light, bigger = false) {
      const pos = worldToScreen(wx, wy);
      const scale = bigger ? 1.0 : 0.8;
      for (let i = 0; i < 6; i++) {
        const a = i * (Math.PI / 3);
        const px = pos.x + Math.cos(a) * PPU * 0.9 * scale;
        const py = pos.y + Math.sin(a) * PPU * 0.7 * scale;
        ctx.fillStyle = rgba(90, 92, 100, 0.95);
        ctx.beginPath();
        ctx.arc(px, py, 3.5 * scale, 0, Math.PI * 2);
        ctx.fill();
      }
      drawShadowCircle(ctx, pos.x, pos.y + 8 * scale, 12 * scale);
      const flick = 1 + Math.sin(time * 10) * 0.18;
      ctx.fillStyle = rgba(255, 110, 42, 0.95);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 18 * flick * scale);
      ctx.quadraticCurveTo(pos.x + 10 * scale, pos.y - 6 * scale, pos.x, pos.y + 10 * scale);
      ctx.quadraticCurveTo(pos.x - 10 * scale, pos.y - 6 * scale, pos.x, pos.y - 18 * flick * scale);
      ctx.fill();
      ctx.fillStyle = rgba(255, 210, 90, 0.95);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 12 * flick * scale);
      ctx.quadraticCurveTo(pos.x + 8 * scale, pos.y - 2 * scale, pos.x, pos.y + 8 * scale);
      ctx.quadraticCurveTo(pos.x - 8 * scale, pos.y - 2 * scale, pos.x, pos.y - 12 * flick * scale);
      ctx.fill();
      const night = 1 - light;
      const g = ctx.createRadialGradient(pos.x, pos.y, 14 * scale, pos.x, pos.y, 72 * scale);
      g.addColorStop(0, rgba(255, 120, 60, 0.18 + 0.30 * night));
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 72 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLayerTile(ctx, tileId, entry, light, time) {
      const tx = tileId % WORLD_SIZE;
      const ty = (tileId / WORLD_SIZE) | 0;
      const pos = worldToScreen(tileToWorld(tx), tileToWorld(ty));
      const x = pos.x;
      const y = pos.y;
      const shade = 0.65 + 0.35 * light;
      const type = entry.type;

      if (type === BUILD.FLOOR) {
        ctx.fillStyle = rgba((120 * shade) | 0, (85 * shade) | 0, (50 * shade) | 0, 0.95);
        pRect(ctx, x, y, PPU + 1, PPU + 1);
        ctx.fillStyle = rgba(0, 0, 0, 0.10);
        for (let i = 0; i < 4; i++) pRect(ctx, x + i * 4, y, 1, PPU + 1);
        return;
      }

      if (type === BUILD.WALL) {
        drawShadowCircle(ctx, x + PPU / 2, y + PPU * 0.95, 10);
        ctx.fillStyle = rgba((110 * shade) | 0, (75 * shade) | 0, (45 * shade) | 0, 0.98);
        pRect(ctx, x, y, PPU + 1, PPU + 1);
        ctx.fillStyle = rgba(0, 0, 0, 0.10);
        for (let r = 0; r < 4; r++) pRect(ctx, x, y + r * 4 + 3, PPU + 1, 1);
        return;
      }

      if (type === BUILD.WINDOW) {
        drawShadowCircle(ctx, x + PPU / 2, y + PPU * 0.95, 10);
        ctx.fillStyle = rgba((110 * shade) | 0, (75 * shade) | 0, (45 * shade) | 0, 0.98);
        pRect(ctx, x, y, PPU + 1, PPU + 1);
        ctx.fillStyle = rgba((40 * shade) | 0, (55 * shade) | 0, (70 * shade) | 0, 0.90);
        pRect(ctx, x + 4, y + 4, PPU - 8, PPU - 8);
        ctx.fillStyle = rgba(120,170,255,0.25);
        pRect(ctx, x + 5, y + 5, PPU - 10, PPU - 10);
        return;
      }

      if (type === BUILD.DOOR) {
        drawShadowCircle(ctx, x + PPU / 2, y + PPU * 0.95, 9);
        ctx.fillStyle = rgba((95 * shade) | 0, (65 * shade) | 0, (40 * shade) | 0, 0.98);
        pRect(ctx, x, y, PPU + 1, PPU + 1);
        ctx.fillStyle = rgba((135 * shade) | 0, (92 * shade) | 0, (55 * shade) | 0, 0.92);
        pRect(ctx, x + 3, y + 2, PPU - 6, PPU - 4);
        return;
      }

      if (type === BUILD.ROOF) {
        ctx.fillStyle = rgba((150 * shade) | 0, (55 * shade) | 0, (50 * shade) | 0, 0.95);
        pRect(ctx, x, y, PPU + 1, PPU + 1);
        ctx.fillStyle = rgba(0,0,0,0.12);
        for (let r = 0; r < 4; r++) pRect(ctx, x + 1, y + r * 4 + 2, PPU - 2, 1);
        return;
      }

      if (type === "tree_object") {
        drawCustomObjectTree(ctx, tileId, light);
        return;
      }

      if (type === "campfire_object") {
        drawCampfire(ctx, tileToWorld(tx), tileToWorld(ty), time, light, false);
        return;
      }

      if (type === "teleporter_spawn") {
        drawShadowCircle(ctx, x + 8, y + 12, 12);
        ctx.fillStyle = rgba(130, 70, 230, 0.95);
        pRect(ctx, x + 1, y + 1, PPU - 1, PPU - 1);
        ctx.fillStyle = rgba(255,220,110,0.95);
        pRect(ctx, x + 4, y + 4, PPU - 8, PPU - 8);
        ctx.fillStyle = rgba(255,255,255,0.55);
        pRect(ctx, x + 7, y + 2, 2, PPU - 4);
      }
    }

    function drawStructureLayer(ctx, light, time) {
      const halfW = INTERNAL_W / (2 * PPU);
      const halfH = INTERNAL_H / (2 * PPU);
      const minTx = clamp(Math.floor(camera.x - halfW) + WORLD_HALF - 4, 0, WORLD_SIZE - 1);
      const maxTx = clamp(Math.floor(camera.x + halfW) + WORLD_HALF + 4, 0, WORLD_SIZE - 1);
      const minTy = clamp(Math.floor(camera.y - halfH) + WORLD_HALF - 4, 0, WORLD_SIZE - 1);
      const maxTy = clamp(Math.floor(camera.y + halfH) + WORLD_HALF + 4, 0, WORLD_SIZE - 1);
      for (let ty = minTy; ty <= maxTy; ty++) {
        for (let tx = minTx; tx <= maxTx; tx++) {
          const tileId = idxOf(tx, ty);
          const entry = getStructureEntry(tileId);
          if (!entry) continue;
          drawLayerTile(ctx, tileId, entry, light, time);
        }
      }
    }

    function drawObjectLayer(ctx, light, time) {
      const halfW = INTERNAL_W / (2 * PPU);
      const halfH = INTERNAL_H / (2 * PPU);
      const minTx = clamp(Math.floor(camera.x - halfW) + WORLD_HALF - 4, 0, WORLD_SIZE - 1);
      const maxTx = clamp(Math.floor(camera.x + halfW) + WORLD_HALF + 4, 0, WORLD_SIZE - 1);
      const minTy = clamp(Math.floor(camera.y - halfH) + WORLD_HALF - 4, 0, WORLD_SIZE - 1);
      const maxTy = clamp(Math.floor(camera.y + halfH) + WORLD_HALF + 4, 0, WORLD_SIZE - 1);
      for (let ty = minTy; ty <= maxTy; ty++) {
        for (let tx = minTx; tx <= maxTx; tx++) {
          const tileId = idxOf(tx, ty);
          const entry = getObjectEntry(tileId);
          if (!entry) continue;
          drawLayerTile(ctx, tileId, entry, light, time);
        }
      }
    }

    function drawBuildGhost(ctx) {
      if (!buildMode) return;
      const tgt = getTargetTile();
      if (!tgt) return;
      const pos = worldToScreen(tileToWorld(tgt.tx), tileToWorld(tgt.ty));
      const ok = canPlaceSelectedAt(tgt.tileId).ok;
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = ok ? "rgba(110,255,170,0.55)" : "rgba(255,90,90,0.55)";
      pRect(ctx, pos.x, pos.y, PPU + 1, PPU + 1);
      ctx.restore();
    }

    function drawClaimPreview(ctx) {
      if (!claimPreviewActive || !claimsAreEnabled()) return;
      const tgt = getTargetTile();
      if (!tgt) return;
      const { chunkX, chunkY } = getChunkFromTile(tgt.tx, tgt.ty);
      const rect = getChunkWorldRect(chunkX, chunkY);
      const p1 = worldToScreen(rect.x1, rect.y1);
      const p2 = worldToScreen(rect.x2, rect.y2);
      const w = p2.x - p1.x;
      const h = p2.y - p1.y;
      const existing = claimsMap.get(claimKey(chunkX, chunkY));
      ctx.save();
      ctx.fillStyle = existing ? "rgba(255,80,80,0.18)" : "rgba(80,180,255,0.18)";
      ctx.strokeStyle = existing ? "rgba(255,80,80,0.80)" : "rgba(80,180,255,0.85)";
      ctx.lineWidth = 2;
      ctx.fillRect(p1.x, p1.y, w, h);
      ctx.strokeRect(p1.x, p1.y, w, h);
      ctx.restore();
    }

    function drawClaimsOverlay(ctx) {
      if (!claimsAreEnabled()) return;
      claimsMap.forEach((claim) => {
        const rect = getChunkWorldRect(claim.chunkX, claim.chunkY);
        const centerX = (rect.x1 + rect.x2) / 2;
        const centerY = (rect.y1 + rect.y2) / 2;
        const dx = Math.abs(centerX - camera.x);
        const dy = Math.abs(centerY - camera.y);
        if (dx > 40 || dy > 28) return;
        const p1 = worldToScreen(rect.x1, rect.y1);
        const p2 = worldToScreen(rect.x2, rect.y2);
        const w = p2.x - p1.x;
        const h = p2.y - p1.y;
        const isMine = claim.ownerUid === myUid;
        ctx.save();
        ctx.fillStyle = isMine ? "rgba(80,150,255,0.10)" : "rgba(255,160,70,0.08)";
        ctx.strokeStyle = isMine ? "rgba(80,150,255,0.70)" : "rgba(255,160,70,0.60)";
        ctx.lineWidth = 2;
        ctx.fillRect(p1.x, p1.y, w, h);
        ctx.strokeRect(p1.x, p1.y, w, h);
        ctx.restore();
      });
    }

    function drawTool(ctx, x, y, dir, swing, mode = "axe") {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(dir + Math.PI / 2 + swing);
      ctx.fillStyle = "#7c4f2b";
      pRect(ctx, -1, -10, 2, 18);
      ctx.fillStyle = "#c3c9d3";
      if (mode === "pickaxe") pRect(ctx, -9, -9, 18, 3);
      else pRect(ctx, 0, -7, 11, 6);
      ctx.restore();
    }

    function drawChatBubble(ctx, x, y, text) {
      if (!text) return;
      ctx.save();
      ctx.font = "bold 10px system-ui, Arial";
      const padX = 6;
      const w = Math.max(28, ctx.measureText(text).width + padX * 2);
      const h = 18;
      const boxX = x - w / 2;
      const boxY = y - 34;
      ctx.fillStyle = "rgba(0,0,0,0.60)";
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = 1;
      if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, w, h, 8);
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillRect(boxX, boxY, w, h);
      }
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, boxY + h / 2 + 0.5);
      ctx.restore();
    }

    function drawPlayerEntity(ctx, ent, time, isRemote = false) {
      const pos = worldToScreen(ent.rx ?? ent.x, ent.ry ?? ent.y);
      const bob = Math.sin(time * 6 + (isRemote ? 0.5 : 0)) * 0.7;
      drawShadowCircle(ctx, pos.x, pos.y + 10, 14);
      const isCreativeVisual = !!ent.isCreative;
      ctx.fillStyle = isRemote ? (isCreativeVisual ? rgba(255,190,70,0.95) : rgba(120,220,140,0.95)) : (isCreativeVisual ? rgba(255,170,70,0.95) : rgba(70,150,255,0.95));
      ctx.beginPath();
      ctx.arc(pos.x, pos.y + bob, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = rgba(255,255,255,0.25);
      ctx.beginPath();
      ctx.arc(pos.x - 3, pos.y - 3 + bob, 4, 0, Math.PI * 2);
      ctx.fill();
      const atk = ent.attack > 0 ? Math.sin(ent.attack * Math.PI) : 0;
      const swing = -0.95 * atk;
      const toolX = pos.x + Math.cos(ent.dir) * 14;
      const toolY = pos.y + Math.sin(ent.dir) * 10 + bob;
      drawTool(ctx, toolX, toolY, ent.dir, swing, ent.tool === TOOL.PICKAXE ? "pickaxe" : "axe");
      ctx.font = "bold 10px system-ui, Arial";
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillText(ent.name || "Player", pos.x + 1, pos.y - 14 + 1);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fillText(ent.name || "Player", pos.x, pos.y - 14);
      if ((ent.quickChatUntil || 0) > Date.now() && ent.quickChatText) drawChatBubble(ctx, pos.x, pos.y - 18, ent.quickChatText);
    }

    function drawToast(ctx) {
      if (toast.t <= 0 || !toast.text) return;
      const pos = worldToScreen(player.x, player.y);
      ctx.save();
      ctx.globalAlpha = clamp(toast.t, 0, 1);
      ctx.font = "bold 12px system-ui, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillText(toast.text, pos.x + 1, pos.y - 18 + 1);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fillText(toast.text, pos.x, pos.y - 18);
      ctx.restore();
    }

    function colorForTileType(tt) {
      if (tt === T.WATER) return [20, 95, 170];
      if (tt === T.SAND) return [210, 195, 120];
      if (tt === T.GRASS) return [45, 160, 65];
      if (tt === T.HILL) return [70, 135, 80];
      return [120, 120, 130];
    }

    function updateMinimap() {
      if (!minimapOn) return;
      const w = mini.width;
      const h = mini.height;
      const img = mctx.createImageData(w, h);
      const data = img.data;
      for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
          const tx = Math.floor((px / w) * WORLD_SIZE);
          const ty = Math.floor((py / h) * WORLD_SIZE);
          const tileId = idxOf(tx, ty);
          const [r, g, b] = colorForTileType(getVisualTerrainType(tileId));
          const i = (py * w + px) * 4;
          data[i] = r; data[i + 1] = g; data[i + 2] = b; data[i + 3] = 255;
        }
      }
      mctx.putImageData(img, 0, 0);

      claimsMap.forEach((claim) => {
        if (!claimsAreEnabled()) return;
        const px = Math.floor(((claim.chunkX * CLAIM_SIZE) / WORLD_SIZE) * w);
        const py = Math.floor(((claim.chunkY * CLAIM_SIZE) / WORLD_SIZE) * h);
        const size = Math.max(2, Math.floor((CLAIM_SIZE / WORLD_SIZE) * w));
        mctx.strokeStyle = claim.ownerUid === myUid ? "rgba(80,150,255,0.9)" : "rgba(255,160,70,0.9)";
        mctx.lineWidth = 1;
        mctx.strokeRect(px, py, size, size);
      });

      if (!isCampfireRemoved()) {
        const cpx = Math.floor(((campfire.x + WORLD_HALF) / WORLD_SIZE) * w);
        const cpy = Math.floor(((campfire.y + WORLD_HALF) / WORLD_SIZE) * h);
        mctx.fillStyle = "rgba(255,140,80,0.95)";
        mctx.beginPath();
        mctx.arc(cpx, cpy, 3, 0, Math.PI * 2);
        mctx.fill();
      }

      terrainLayerMap.forEach((_, tileId) => {
        const tx = tileId % WORLD_SIZE;
        const ty = (tileId / WORLD_SIZE) | 0;
        mctx.fillStyle = "rgba(255,255,255,0.50)";
        mctx.fillRect(Math.floor((tx / WORLD_SIZE) * w), Math.floor((ty / WORLD_SIZE) * h), 1, 1);
      });
      structureLayerMap.forEach((_, tileId) => {
        const tx = tileId % WORLD_SIZE;
        const ty = (tileId / WORLD_SIZE) | 0;
        mctx.fillStyle = "rgba(255,255,255,0.92)";
        mctx.fillRect(Math.floor((tx / WORLD_SIZE) * w), Math.floor((ty / WORLD_SIZE) * h), 1, 1);
      });
      objectLayerMap.forEach((_, tileId) => {
        const tx = tileId % WORLD_SIZE;
        const ty = (tileId / WORLD_SIZE) | 0;
        mctx.fillStyle = "rgba(255,210,70,0.92)";
        mctx.fillRect(Math.floor((tx / WORLD_SIZE) * w), Math.floor((ty / WORLD_SIZE) * h), 2, 2);
      });
      remotePlayers.forEach((rp) => {
        const px = Math.floor((((rp.rx ?? rp.x) + WORLD_HALF) / WORLD_SIZE) * w);
        const py = Math.floor((((rp.ry ?? rp.y) + WORLD_HALF) / WORLD_SIZE) * h);
        mctx.fillStyle = rp.isCreative ? "rgba(255,190,70,0.95)" : "rgba(110,255,140,0.95)";
        mctx.fillRect(px, py, 2, 2);
      });
      const ppx = Math.floor(((player.x + WORLD_HALF) / WORLD_SIZE) * w);
      const ppy = Math.floor(((player.y + WORLD_HALF) / WORLD_SIZE) * h);
      mctx.save();
      mctx.translate(ppx, ppy);
      mctx.rotate(player.dir);
      mctx.fillStyle = "rgba(255,255,255,0.95)";
      mctx.beginPath();
      mctx.moveTo(0, -6);
      mctx.lineTo(4, 4);
      mctx.lineTo(-4, 4);
      mctx.closePath();
      mctx.fill();
      mctx.restore();
    }

    function buildQuickChatWheel() {
      quickChatCenter.innerHTML = "";
      const cx = 165;
      const cy = 165;
      const radius = 120;
      QUICK_CHAT_MESSAGES.forEach((msg, i) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * i / QUICK_CHAT_MESSAGES.length);
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        const btn = document.createElement("button");
        btn.className = "chat-option";
        btn.textContent = msg;
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          await sendQuickChat(msg);
          closeQuickChat();
        });
        quickChatCenter.appendChild(btn);
      });
    }

    buildQuickChatWheel();

    function openQuickChat() {
      quickChatOpen = true;
      quickChatWheel.classList.add("show");
    }

    function closeQuickChat() {
      quickChatOpen = false;
      quickChatWheel.classList.remove("show");
    }

    quickChatBackdrop.addEventListener("click", closeQuickChat);

    function getTargetTile() {
      let tx, ty;
      if (!isCoarse && mouseAim) {
        const ix = (mouseAim.x - view.ox) / view.scale;
        const iy = (mouseAim.y - view.oy) / view.scale;
        if (ix >= 0 && iy >= 0 && ix < INTERNAL_W && iy < INTERNAL_H) {
          const wx = (ix - INTERNAL_W / 2) / PPU + camera.x;
          const wy = (iy - INTERNAL_H / 2) / PPU + camera.y;
          tx = worldToTile(wx);
          ty = worldToTile(wy);
        }
      }
      if (tx == null || ty == null) {
        const wx = player.x + Math.cos(player.dir) * 2.0;
        const wy = player.y + Math.sin(player.dir) * 2.0;
        tx = worldToTile(wx);
        ty = worldToTile(wy);
      }
      if (!inBounds(tx, ty)) return null;
      return { tx, ty, tileId: idxOf(tx, ty) };
    }

    function getClaimForTile(tileId) {
      const tx = tileId % WORLD_SIZE;
      const ty = (tileId / WORLD_SIZE) | 0;
      const { chunkX, chunkY } = getChunkFromTile(tx, ty);
      return claimsMap.get(claimKey(chunkX, chunkY)) || null;
    }

    function canModifyTile(tileId, mode = "build") {
      if (hasAdvancedBuilderAccess()) return { ok: true, reason: "" };
      if (mode === "build" && !canBuildServerWide()) return { ok: false, reason: "You can't build on this server" };
      if (mode === "break" && !canBreakServerWide()) return { ok: false, reason: "Breaking is disabled" };
      if (!claimsAreEnabled()) return { ok: true, reason: "" };
      const claim = getClaimForTile(tileId);
      if (!claim) return { ok: true, reason: "" };
      if (claim.ownerUid === myUid) return { ok: true, reason: "" };
      if (claim.access === "sharedBuild") return { ok: true, reason: "" };
      return { ok: false, reason: `Claimed by ${claim.ownerName || "player"}` };
    }

    function canPlaceSelectedAt(tileId) {
      const perm = canModifyTile(tileId, "build");
      if (!perm.ok) return perm;
      const tx = tileId % WORLD_SIZE;
      const ty = (tileId / WORLD_SIZE) | 0;
      if (!inBounds(tx, ty)) return { ok: false, reason: "Out of bounds" };
      if (selectedBuild.layer === "terrain") return { ok: true, reason: "" };
      if (selectedBuild.layer === "object") return { ok: true, reason: "" };
      if (isWaterTile(tileId) && !hasAdvancedBuilderAccess()) return { ok: false, reason: "Water tile" };
      return { ok: true, reason: "" };
    }

    async function syncCampfireRemoved(value) {
      try {
        await updateDoc(doc(db, "servers", serverId), { campfireRemoved: !!value, updatedAt: serverTimestamp() });
      } catch (e) { console.error("syncCampfireRemoved error:", e); }

    async function removeNaturalAt(tileId) {
      let changed = false;
      for (const t of trees) {
        if (t.tileId === tileId && !t.removed) {
          t.removed = true;
          removedTrees.add(tileId);
          const i = colliders.indexOf(t.collider);
          if (i !== -1) colliders.splice(i, 1);
          try {
            await setDoc(doc(db, "servers", serverId, "removedTrees", String(tileId)), {
              tileId, removedAt: serverTimestamp(), removedBy: myUid,
            });
          } catch (e) { console.error(e); }
          changed = true;
        }
      }
      for (const b of boulders) {
        if (b.tileId === tileId && !b.removed) {
          b.removed = true;
          removedBoulders.add(tileId);
          const i = colliders.indexOf(b.collider);
          if (i !== -1) colliders.splice(i, 1);
          try {
            await setDoc(doc(db, "servers", serverId, "removedBoulders", String(tileId)), {
              tileId, removedAt: serverTimestamp(), removedBy: myUid,
            });
          } catch (e) { console.error(e); }
          changed = true;
        }
      }
      const spawnTileId = idxOf(worldToTile(campfire.x), worldToTile(campfire.y));
      if (tileId === spawnTileId && !isCampfireRemoved()) {
        await syncCampfireRemoved(true);
        changed = true;
      }
      if (changed) minimapDirty = true;
      return changed;
    }

      return `${layer}_${tileId}`;

      await setDoc(doc(db, "servers", serverId, "builds", buildDocId(layer, tileId)), {

      });

    async function deleteLayerTile(layer, tileId) {
      await deleteDoc(doc(db, "servers", serverId, "builds", buildDocId(layer, tileId)));
      if (layer === "structure") {

      }

    async function placeSelected(tileId) {
      const check = canPlaceSelectedAt(tileId);
      if (!check.ok) {
        showToast(check.reason, 1.0);
        audio.beep(180, 0.10, 0.04);
        return false;
      }

      if (selectedBuild.layer === "terrain" || selectedBuild.layer === "object" || hasAdvancedBuilderAccess()) {
        await removeNaturalAt(tileId);
      }

      if (selectedBuild.layer === "structure" && !isFreeBuildForMe()) {
        const cost = COST[selectedBuild.type] || 1;
        if (wood < cost) {
          showToast("Not enough wood", 1.0);
          audio.beep(180, 0.10, 0.04);
          return false;
        }
        wood -= cost;
      }

      if (selectedBuild.layer === "terrain") terrainLayerMap.set(tileId, { type: selectedBuild.type, rot: selectedBuild.rot || 0 });
      else if (selectedBuild.layer === "structure") structureLayerMap.set(tileId, { type: selectedBuild.type, rot: selectedBuild.rot || 0 });
      else objectLayerMap.set(tileId, { type: selectedBuild.type, rot: selectedBuild.rot || 0 });

      rebuildBuildColliders();
      minimapDirty = true;
      const tx = tileId % WORLD_SIZE;
      const ty = (tileId / WORLD_SIZE) | 0;
      spawnParticles("build", tileToWorld(tx), tileToWorld(ty), 10);
      audio.beep(560, 0.05, 0.04);

      try { await upsertLayerTile(selectedBuild.layer, tileId, selectedBuild.type, selectedBuild.rot || 0); }
      catch (e) { console.error("placeSelected sync error:", e); }
      return true;
    }

    async function removeAtTile(tileId) {
      const perm = canModifyTile(tileId, "break");
      if (!perm.ok) {
        showToast(perm.reason, 1.1);
        audio.beep(180, 0.10, 0.04);
        return false;
      }

      if (getObjectEntry(tileId)) {
        objectLayerMap.delete(tileId);
        rebuildBuildColliders();
        minimapDirty = true;
        await deleteLayerTile("object", tileId).catch(console.error);
        showToast("Object removed", 0.8);
        return true;
      }

      if (getStructureEntry(tileId)) {
        const entry = getStructureEntry(tileId);
        structureLayerMap.delete(tileId);
        rebuildBuildColliders();
        minimapDirty = true;
        if (!isFreeBuildForMe()) wood += Math.max(1, Math.floor((COST[entry.type] || 1) * 0.5));
        await deleteLayerTile("structure", tileId).catch(console.error);
        showToast(isFreeBuildForMe() ? "Structure removed" : "Removed (+wood)", 0.8);
        return true;
      }

      if (getTerrainEntry(tileId)) {
        terrainLayerMap.delete(tileId);
        minimapDirty = true;
        await deleteLayerTile("terrain", tileId).catch(console.error);
        showToast("Terrain removed", 0.8);
        return true;
      }

      const removedNatural = await removeNaturalAt(tileId);
      if (removedNatural) {
        showToast("Natural object removed", 0.8);
        return true;
      }

      showToast("Nothing to remove", 0.7);
      audio.beep(180, 0.10, 0.04);
      return false;
    }

    async function chopNearestTree() {
      if (!hasAxeAccess()) {
        showToast("This server disabled axe", 1.0);
        audio.beep(180, 0.10, 0.04);
        return;
      }
      let best = null;
      let bestD = 3.2 * 3.2;
      for (const t of trees) {
        if (t.removed || getObjectEntry(t.tileId)) continue;
        const d = dist2(player.x, player.y, t.x, t.y);
        if (d < bestD) { bestD = d; best = t; }
      }
      if (!best) return;
      const perm = canModifyTile(best.tileId, "break");
      if (!perm.ok) {
        showToast(perm.reason, 1.1);
        audio.beep(180, 0.10, 0.04);
        return;
      }
      best.hp -= isFreeBuildForMe() ? 99 : 1;
      spawnParticles("chips", best.x, best.y, 12);
      audio.beep(240, 0.05, 0.04);
      if (best.hp <= 0) {
        best.removed = true;
        removedTrees.add(best.tileId);
        const i = colliders.indexOf(best.collider);
        if (i !== -1) colliders.splice(i, 1);
        if (!isFreeBuildForMe()) wood += 1;
        showToast(isFreeBuildForMe() ? "Tree removed" : "+1 wood", 0.7);
        minimapDirty = true;
        try {
          await setDoc(doc(db, "servers", serverId, "removedTrees", String(best.tileId)), {
            tileId: best.tileId, removedAt: serverTimestamp(), removedBy: myUid,
          });
        } catch (e) { console.error(e); }
      }
    }

    async function mineNearestBoulder() {
      let best = null;
      let bestD = 3.3 * 3.3;
      for (const b of boulders) {
        if (b.removed) continue;
        const d = dist2(player.x, player.y, b.x, b.y);
        if (d < bestD) { bestD = d; best = b; }
      }
      if (!best) return;
      const perm = canModifyTile(best.tileId, "break");
      if (!perm.ok) {
        showToast(perm.reason, 1.1);
        audio.beep(180, 0.10, 0.04);
        return;
      }
      best.hp -= isFreeBuildForMe() ? 99 : 1;
      spawnParticles("chips", best.x, best.y, 10);
      audio.beep(best.type === "coal" ? 520 : 680, 0.06, 0.04);
      if (best.hp <= 0) {
        best.removed = true;
        removedBoulders.add(best.tileId);
        const i = colliders.indexOf(best.collider);
        if (i !== -1) colliders.splice(i, 1);
        if (!isFreeBuildForMe()) {
          if (best.type === "coal") { coal += 1; stone += 1; showToast("+coal +stone", 0.8); }
          else { stone += 1; showToast("+1 stone", 0.8); }
        } else {
          showToast("Rock removed", 0.7);
        }
        minimapDirty = true;
        try {
          await setDoc(doc(db, "servers", serverId, "removedBoulders", String(best.tileId)), {
            tileId: best.tileId, removedAt: serverTimestamp(), removedBy: myUid,
          });
        } catch (e) { console.error(e); }
      }
    }

    let touchMoveX = 0;
    let touchMoveY = 0;

    function setupMoveStick(pad, stick) {
      const stickRadius = 30;
      let touchId = null;
      function reset() {
        const rect = pad.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        stick.style.left = (cx - stickRadius) + "px";
        stick.style.top = (cy - stickRadius) + "px";
        touchMoveX = 0;
        touchMoveY = 0;
      }
      function updateFromTouch(t) {
        const rect = pad.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        let dx = t.clientX - (rect.left + cx);
        let dy = t.clientY - (rect.top + cy);
        const maxR = rect.width / 2 - stickRadius;
        const d = Math.hypot(dx, dy);
        if (d > maxR) { dx *= maxR / d; dy *= maxR / d; }
        stick.style.left = (cx - stickRadius + dx) + "px";
        stick.style.top = (cy - stickRadius + dy) + "px";
        touchMoveX = dx / maxR;
        touchMoveY = dy / maxR;
      }
      pad.addEventListener("touchstart", (e) => {
        e.preventDefault();
        audio.resume();
        const t = e.changedTouches[0];
        touchId = t.identifier;
        updateFromTouch(t);
      }, { passive: false });
      pad.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (touchId === null) return;
        for (const t of e.touches) {
          if (t.identifier === touchId) { updateFromTouch(t); break; }
        }
      }, { passive: false });
      function end(e) {
        if (touchId === null) return;
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) { touchId = null; reset(); break; }
        }
      }
      pad.addEventListener("touchend", end, { passive: false });
      pad.addEventListener("touchcancel", end, { passive: false });
      reset();
    }

    if (movePad && moveStick) setupMoveStick(movePad, moveStick);

    function setupScreenView() {
      const screenW = innerWidth;
      const screenH = innerHeight;
      const scale = Math.max(1, Math.floor(Math.min(screenW / INTERNAL_W, screenH / INTERNAL_H)));
      const drawW = INTERNAL_W * scale;
      const drawH = INTERNAL_H * scale;
      const ox = ((screenW - drawW) / 2) | 0;
      const oy = ((screenH - drawH) / 2) | 0;
      view.scale = scale;
      view.ox = ox;
      view.oy = oy;
      return { drawW, drawH, ox, oy };
    }

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      gameCanvas.width = Math.floor(innerWidth * dpr);
      gameCanvas.height = Math.floor(innerHeight * dpr);
      gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function worldToScreen(wx, wy) {
      const sx = (wx - camera.x) * PPU + INTERNAL_W / 2;
      const sy = (wy - camera.y) * PPU + INTERNAL_H / 2;
      return { x: sx, y: sy };
    }

    function pRect(ctx, x, y, w, h) {
      ctx.fillRect((x | 0), (y | 0), (w | 0), (h | 0));
    }

    function drawShadowCircle(ctx, x, y, r) {
      ctx.fillStyle = "rgba(0,0,0,0.30)";
      ctx.beginPath();
      ctx.ellipse(x, y, r * 1.15, r * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function spawnParticles(type, x, y, count = 10) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 2.5 + Math.random() * 4.5;
        particles.push({ type, x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.35 + Math.random() * 0.45 });
      }
    }

    async function syncServerPresence(force = false) {
      if (!serverMeta || !myUid) return;
      const now = Date.now();
      if (!force && now - lastServerSyncAt < 4000) return;
      lastServerSyncAt = now;
      try {
        await updateDoc(doc(db, "servers", serverId), {
          lastHeartbeat: serverTimestamp(),
          status: actualPlayersCount > 0 ? "online" : "offline",
          playerCount: actualPlayersCount,
          updatedAt: serverTimestamp(),
        });
      } catch (e) { console.error("syncServerPresence error:", e); }
    }

    async function syncMyPlayer(force = false) {
      if (!myUid || !myName || !canPlay) return;
      const now = Date.now();
      const movedEnough = Math.abs(player.x - lastSentX) > 0.05 || Math.abs(player.y - lastSentY) > 0.05 || Math.abs(player.dir - lastSentDir) > 0.05;
      if (!force && !movedEnough && now - lastNetSendAt < 900) return;
      lastNetSendAt = now;
      lastSentX = player.x;
      lastSentY = player.y;
      lastSentDir = player.dir;
      try {
        await setDoc(doc(db, "servers", serverId, "players", myUid), {
          uid: myUid,
          name: myName,
          avatar: myAvatar || DEFAULT_AVATAR,
          x: player.x,
          y: player.y,
          dir: player.dir,
          tool: currentTool,
          isCreative: isCreativeForMe(),
          lastActive: serverTimestamp(),
          quickChatText: player.quickChatText || "",
          quickChatUntil: player.quickChatUntil || 0,
        }, { merge: true });
      } catch (e) { console.error("syncMyPlayer error:", e); }
    }

    async function heartbeat() {
      if (!myUid || !canPlay) return;
      const now = Date.now();
      if (now - lastHeartbeatAt < 4000) return;
      lastHeartbeatAt = now;
      try {
        await setDoc(doc(db, "servers", serverId, "players", myUid), {
          lastActive: serverTimestamp(),
          name: myName,
          avatar: myAvatar || DEFAULT_AVATAR,
          isCreative: isCreativeForMe(),
        }, { merge: true });
