<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>PINE Tycoon Multiplayer</title>
  <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;touch-action:none}
    #game{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
    #hud{position:fixed;left:10px;bottom:10px;z-index:40;padding:8px 10px;border-radius:12px;background:rgba(0,0,0,.55);color:#fff;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 25px rgba(0,0,0,.35);user-select:none;pointer-events:none;max-width:min(980px,calc(100vw - 20px))}
    #hud .small{font-size:11px;font-weight:600;opacity:.92;margin-top:3px;line-height:1.45}
    #topBar{position:fixed;left:10px;top:10px;z-index:45;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-width:calc(100vw - 20px)}
    .glass{background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
    #serverInfo{padding:8px 12px;font-size:12px;font-weight:700}.top-btn{padding:8px 12px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:13px;font-weight:700}.top-btn:hover{transform:scale(1.04)}
    #minimapWrap{position:fixed;right:10px;top:10px;z-index:41;width:140px;height:140px;border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.7);background:rgba(0,0,0,.25);box-shadow:0 10px 25px rgba(0,0,0,.35);display:none}#minimap{width:100%;height:100%;image-rendering:pixelated}
    #touchControls{position:fixed;inset:0;pointer-events:none;z-index:30;display:none}#touchControls .pad{position:absolute;width:124px;height:124px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:radial-gradient(circle,rgba(255,255,255,.12) 0,rgba(0,0,0,0) 60%);pointer-events:auto;touch-action:none;backdrop-filter:blur(2px)}#movePad{left:18px;bottom:28px}#touchControls .stick{position:absolute;width:60px;height:60px;border-radius:50%;left:32px;top:32px;background:rgba(46,204,113,.82);box-shadow:0 0 14px rgba(46,204,113,.95)}
    #actionBtn{position:absolute;right:22px;bottom:22px;width:90px;height:90px;border-radius:50%;border:none;background:radial-gradient(circle,#ffb347 0,#e67e22 60%);box-shadow:0 0 18px rgba(230,126,34,.95);font-size:36px;color:#fff;pointer-events:auto;touch-action:none;user-select:none}
    #errBox,#loadingBox{position:fixed;left:10px;right:10px;z-index:99;color:#fff;padding:10px 12px;border-radius:12px;font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre-wrap;border:1px solid rgba(255,255,255,.18)}#errBox{background:rgba(120,0,0,.8);display:none;bottom:10px;pointer-events:none}#loadingBox{top:50%;bottom:auto;transform:translateY(-50%);text-align:center;background:rgba(0,0,0,.7);max-width:480px;margin:0 auto}
    #quickChatWheel{position:fixed;inset:0;z-index:70;display:none;pointer-events:none}#quickChatWheel.show{display:block}#quickChatBackdrop{position:absolute;inset:0;background:rgba(0,0,0,.16)}#quickChatCenter{position:absolute;left:50%;top:50%;width:330px;height:330px;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none}
    .chat-option{position:absolute;width:96px;height:40px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.76);color:#fff;font-size:13px;font-weight:700;cursor:pointer;pointer-events:auto;box-shadow:0 8px 20px rgba(0,0,0,.28);transform:translate(-50%,-50%) scale(.96);transition:transform .14s ease,background .14s ease}.chat-option:hover{transform:translate(-50%,-50%) scale(1.05);background:rgba(255,160,70,.9)}#quickChatHint{position:absolute;left:50%;top:calc(50% + 190px);transform:translateX(-50%);color:#fff;font-size:12px;font-weight:700;background:rgba(0,0,0,.58);padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);pointer-events:none}
    @media(pointer:coarse){#touchControls{display:block}#minimapWrap{width:120px;height:120px}#hud{font-size:12px}}
  </style>

<body>
  <canvas id="game"></canvas>
  <div id="topBar">
    <div id="serverInfo" class="glass">Loading server...</div>
    <button id="leaveBtn" class="top-btn glass">Leave</button>

  </div>
  <div id="hud"></div>
  <div id="minimapWrap"><canvas id="minimap" width="140" height="140"></canvas></div>
  <div id="touchControls"><div id="movePad" class="pad"><div id="moveStick" class="stick"></div></div><button id="actionBtn">🪓</button></div>
  <div id="loadingBox">Connecting to multiplayer server...</div>
  <div id="errBox"></div>
  <div id="quickChatWheel"><div id="quickChatBackdrop"></div><div id="quickChatCenter"></div><div id="quickChatHint">Hold Q → choose a safe quick message</div></div>
<script type="module">

const PLAYER_TIMEOUT_MS = 10000;
const SERVER_TIMEOUT_MS = 12000;

const CLAIM_SIZE = 16;
const QUICK_CHAT_MESSAGES = ["Hello!","Bye!","How are you?","Follow me!","Need help!","Thanks!","Sorry!","Good luck!",";)",":D",":(",":3"];

const errBox = document.getElementById("errBox");
const loadingBox = document.getElementById("loadingBox");
const hudEl = document.getElementById("hud");
const serverInfoEl = document.getElementById("serverInfo");
const leaveBtn = document.getElementById("leaveBtn");
const audioBtn = document.getElementById("audioBtn");
const miniWrap = document.getElementById("minimapWrap");
const mini = document.getElementById("minimap");
const mctx = mini.getContext("2d");
const gameCanvas = document.getElementById("game");
const gctx = gameCanvas.getContext("2d");
const movePad = document.getElementById("movePad");
const moveStick = document.getElementById("moveStick");
const actionBtn = document.getElementById("actionBtn");
const quickChatWheel = document.getElementById("quickChatWheel");
const quickChatCenter = document.getElementById("quickChatCenter");
const quickChatBackdrop = document.getElementById("quickChatBackdrop");

function showErr(msg){ errBox.style.display = "block"; errBox.textContent = String(msg); console.error(msg); }
window.addEventListener("error", e => showErr("JS ERROR:\n" + (e.message || e.error || e)));
window.addEventListener("unhandledrejection", e => showErr("PROMISE ERROR:\n" + (e.reason?.message || e.reason || e)));

const audio = {
  ctx:null, muted:true,
  ensure(){ if(this.ctx) return; const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return; this.ctx = new AC(); },
  resume(){ this.ensure(); if(this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  beep(freq=440,dur=.08,vol=.03){ if(this.muted) return; this.resume(); if(!this.ctx) return; const t=this.ctx.currentTime; const osc=this.ctx.createOscillator(); const gain=this.ctx.createGain(); osc.type="triangle"; osc.frequency.setValueAtTime(freq,t); gain.gain.setValueAtTime(vol,t); gain.gain.exponentialRampToValueAtTime(.0001,t+dur); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(t); osc.stop(t+dur); },
  toggle(){ this.muted=!this.muted; if(!this.muted) this.beep(700,.06,.04); audioBtn.textContent=this.muted?"Audio: Off":"Audio: On"; }
};
audioBtn.addEventListener("click",()=>audio.toggle());
window.addEventListener("pointerdown",()=>audio.resume(),{once:true,capture:true});
window.addEventListener("keydown",()=>audio.resume(),{once:true,capture:true});

const isCoarse = matchMedia("(pointer:coarse)").matches;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const dist2 = (ax,ay,bx,by)=>{ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };
const rgba = (r,g,b,a)=>`rgba(${r},${g},${b},${a})`;
const easeOutQuint = (t)=>1-Math.pow(1-t,5);
const getTimestampMs = (ts)=>ts?.toDate ? ts.toDate().getTime() : 0;
const getIsFresh = (ts, timeout)=>{ const ms=getTimestampMs(ts); return !!(ms && Date.now()-ms<timeout); };

const INTERNAL_W = 512, INTERNAL_H = 288;
const buffer = document.createElement("canvas"); buffer.width = INTERNAL_W; buffer.height = INTERNAL_H;
const bctx = buffer.getContext("2d"); bctx.imageSmoothingEnabled = false; gctx.imageSmoothingEnabled = false;
const view = { scale:1, ox:0, oy:0 };
const PPU = 16, WORLD_HALF = 160, WORLD_SIZE = WORLD_HALF * 2;
const T = { WATER:0, SAND:1, GRASS:2, HILL:3, ROCK:4 };
const BUILD = { FLOOR:"floor", WALL:"wall", DOOR:"door", WINDOW:"window", ROOF:"roof" };
const TOOL = { AXE:0, PICKAXE:1 };
const COST = { floor:1, wall:2, door:3, window:3, roof:2 };
const tileMap = new Uint8Array(WORLD_SIZE * WORLD_SIZE);
const heightMap = new Float32Array(WORLD_SIZE * WORLD_SIZE);
const moistMap = new Float32Array(WORLD_SIZE * WORLD_SIZE);
const riverMask = new Uint8Array(WORLD_SIZE * WORLD_SIZE);
const idxOf = (tx,ty)=>ty*WORLD_SIZE+tx;
const inBounds = (tx,ty)=>tx>=0 && ty>=0 && tx<WORLD_SIZE && ty<WORLD_SIZE;
const worldToTile = (wx)=>Math.floor(wx + WORLD_HALF);
const tileToWorld = (tx)=>(tx - WORLD_HALF) + .5;
const claimKey = (chunkX,chunkY)=>`${chunkX}_${chunkY}`;

function getChunkFromTile(tx,ty){ return { chunkX: Math.floor(tx / CLAIM_SIZE), chunkY: Math.floor(ty / CLAIM_SIZE) }; }
function getChunkWorldRect(chunkX,chunkY){ const startTx=chunkX*CLAIM_SIZE, startTy=chunkY*CLAIM_SIZE, endTx=startTx+CLAIM_SIZE-1, endTy=startTy+CLAIM_SIZE-1; return { x1: tileToWorld(startTx)-.5, y1: tileToWorld(startTy)-.5, x2: tileToWorld(endTx)+.5, y2: tileToWorld(endTy)+.5 }; }

const colliders = [];
function addColliderRect(x,y,hw,hh,tag=""){ const r={x,y,hw,hh,tag}; colliders.push(r); return r; }
function circleRectCollide(px,py,pr,r){ const cx=clamp(px,r.x-r.hw,r.x+r.hw), cy=clamp(py,r.y-r.hh,r.y+r.hh); const dx=px-cx, dy=py-cy; return dx*dx+dy*dy<=pr*pr; }
function isBlocked(px,py,pr){ return colliders.some(r=>circleRectCollide(px,py,pr,r)); }
function tileOccupiedByCollider(wx,wy,pad=.48){ for(const r of colliders){ if(Math.abs(r.x-wx)<r.hw+pad && Math.abs(r.y-wy)<r.hh+pad) return true; } return false; }

function xmur3(str){ let h=1779033703 ^ str.length; for(let i=0;i<str.length;i++){ h=Math.imul(h^str.charCodeAt(i),3432918353); h=(h<<13)|(h>>>19); } return function(){ h=Math.imul(h^(h>>>16),2246822507); h=Math.imul(h^(h>>>13),3266489909); h^=h>>>16; return h>>>0; }; }
function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61); return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
const fade = (t)=>t*t*(3-2*t);
function hash2(ix,iy,seedU32){ let h=seedU32 ^ (ix*374761393) ^ (iy*668265263); h=Math.imul(h^(h>>>13),1274126177); h^=(h>>>16); return (h>>>0)/4294967296; }
function valueNoise2D(x,y,seedU32){ const x0=Math.floor(x), y0=Math.floor(y), x1=x0+1, y1=y0+1; const sx=fade(x-x0), sy=fade(y-y0); const n00=hash2(x0,y0,seedU32), n10=hash2(x1,y0,seedU32), n01=hash2(x0,y1,seedU32), n11=hash2(x1,y1,seedU32); return lerp(lerp(n00,n10,sx), lerp(n01,n11,sx), sy); }
function fbm(x,y,seedU32,oct=5){ let v=0,amp=.55,freq=1,norm=0; for(let i=0;i<oct;i++){ v += valueNoise2D(x*freq,y*freq,seedU32+i*1013)*amp; norm += amp; amp *= .55; freq *= 2; } return v / norm; }

let seedStr="", seedU32=0, rng=Math.random;
function setSeed(str){ seedStr=str; const seedFn=xmur3(seedStr); seedU32=seedFn(); rng=mulberry32(seedU32); }

let trees=[], boulders=[], particles=[], buildMap=new Map(), removedTrees=new Set(), removedBoulders=new Set(), claimsMap=new Map();
const campfire = { x:0, y:0 };
const player = { x:0, y:0, r:.6, dir:0, attack:0, attackCooldown:0, name:"You", avatar:DEFAULT_AVATAR, quickChatText:"", quickChatUntil:0 };
const camera = { x:0, y:0 };
let wood=0, stone=0, coal=0, currentTool=TOOL.AXE, buildMode=false, buildType=BUILD.WALL, buildRot=0, minimapOn=false, minimapDirty=true, minimapTimer=0, quickChatOpen=false, claimPreviewActive=false;
const toast = { text:"", t:0 };
const keys = {};
document.addEventListener("keydown", e => keys[e.code]=true);
document.addEventListener("keyup", e => keys[e.code]=false);
let mouseAim = null;
window.addEventListener("mousemove", e => mouseAim={x:e.clientX,y:e.clientY});
window.addEventListener("mouseleave", ()=>mouseAim=null);
let touchMoveX=0, touchMoveY=0;

function setupMoveStick(pad,stick){ const stickRadius=30; let touchId=null; function reset(){ const rect=pad.getBoundingClientRect(), cx=rect.width/2, cy=rect.height/2; stick.style.left=(cx-stickRadius)+"px"; stick.style.top=(cy-stickRadius)+"px"; touchMoveX=0; touchMoveY=0; } function updateFromTouch(t){ const rect=pad.getBoundingClientRect(), cx=rect.width/2, cy=rect.height/2; let dx=t.clientX-(rect.left+cx), dy=t.clientY-(rect.top+cy); const maxR=rect.width/2-stickRadius; const d=Math.hypot(dx,dy); if(d>maxR){ dx*=maxR/d; dy*=maxR/d; } stick.style.left=(cx-stickRadius+dx)+"px"; stick.style.top=(cy-stickRadius+dy)+"px"; touchMoveX=dx/maxR; touchMoveY=dy/maxR; }
  pad.addEventListener("touchstart",e=>{ e.preventDefault(); audio.resume(); const t=e.changedTouches[0]; touchId=t.identifier; updateFromTouch(t); },{passive:false});
  pad.addEventListener("touchmove",e=>{ e.preventDefault(); if(touchId===null) return; for(const t of e.touches){ if(t.identifier===touchId){ updateFromTouch(t); break; } } },{passive:false});
  function end(e){ if(touchId===null) return; for(const t of e.changedTouches){ if(t.identifier===touchId){ touchId=null; reset(); break; } } }
  pad.addEventListener("touchend",end,{passive:false}); pad.addEventListener("touchcancel",end,{passive:false}); reset();
}
if(movePad && moveStick) setupMoveStick(movePad,moveStick);

function resize(){ const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1)); gameCanvas.width=Math.floor(innerWidth*dpr); gameCanvas.height=Math.floor(innerHeight*dpr); gctx.setTransform(dpr,0,0,dpr,0,0); }
function worldToScreen(wx,wy){ return { x:(wx-camera.x)*PPU + INTERNAL_W/2, y:(wy-camera.y)*PPU + INTERNAL_H/2 }; }
function pRect(ctx,x,y,w,h){ ctx.fillRect((x|0),(y|0),(w|0),(h|0)); }
function drawShadowCircle(ctx,x,y,r){ ctx.fillStyle="rgba(0,0,0,.30)"; ctx.beginPath(); ctx.ellipse(x,y,r*1.15,r*.7,0,0,Math.PI*2); ctx.fill(); }
function spawnParticles(type,x,y,count=10){ for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2, sp=2.5+Math.random()*4.5; particles.push({type,x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.35+Math.random()*.45}); } }
function showToast(text,seconds=1){ toast.text=text; toast.t=seconds; }

function clearWorldGeometry(){ colliders.length=0; trees=[]; boulders=[]; particles=[]; riverMask.fill(0); }
function classifyTiles(){ for(let ty=0;ty<WORLD_SIZE;ty++){ for(let tx=0;tx<WORLD_SIZE;tx++){ const id=idxOf(tx,ty), h=heightMap[id]; let tt=T.GRASS; if(h<.24) tt=T.WATER; else if(h<.29) tt=T.SAND; else if(h<.72) tt=T.GRASS; else if(h<.84) tt=T.HILL; else tt=T.ROCK; tileMap[id]=tt; } } }
function buildBaseNoise(){ const ox=rng()*1000, oy=rng()*1000, mx=rng()*1000, my=rng()*1000, elevScale=.045, moistScale=.06; for(let ty=0;ty<WORLD_SIZE;ty++){ for(let tx=0;tx<WORLD_SIZE;tx++){ const wx=tx-WORLD_HALF, wy=ty-WORLD_HALF, nx=wx*elevScale+ox, ny=wy*elevScale+oy; let h=fbm(nx,ny,seedU32,5); const r=Math.sqrt(wx*wx+wy*wy)/WORLD_HALF, edge=clamp(1-(r*r)*.85,0,1); h=h*.90+edge*.18; h=clamp(h,0,1); const mnx=wx*moistScale+mx, mny=wy*moistScale+my, m=fbm(mnx,mny,seedU32+99991,4); heightMap[idxOf(tx,ty)] = h; moistMap[idxOf(tx,ty)] = m; } } }
function carveRivers(){ const flow=new Uint16Array(WORLD_SIZE*WORLD_SIZE); function lowestNeighbor(tx,ty){ let bestTx=tx,bestTy=ty,bestH=heightMap[idxOf(tx,ty)]; for(let oy=-1;oy<=1;oy++){ for(let ox=-1;ox<=1;ox++){ if(ox===0&&oy===0) continue; const nx=tx+ox, ny=ty+oy; if(!inBounds(nx,ny)) continue; const nh=heightMap[idxOf(nx,ny)]; if(nh<bestH){ bestH=nh; bestTx=nx; bestTy=ny; } } } return {tx:bestTx, ty:bestTy}; }
  const sources=[]; for(let i=0,tries=0;i<10&&tries<5000;tries++){ const tx=10+((rng()*(WORLD_SIZE-20))|0), ty=10+((rng()*(WORLD_SIZE-20))|0), id=idxOf(tx,ty), h=heightMap[id], m=moistMap[id]; if(h<.74||tileMap[id]===T.ROCK||m<.42) continue; sources.push({tx,ty}); i++; }
  for(const s of sources){ let tx=s.tx, ty=s.ty; const visited=new Set(); for(let step=0;step<2400;step++){ const id=idxOf(tx,ty); flow[id]=Math.min(65535,flow[id]+25); if(heightMap[id]<.26) break; const key=(tx<<16)|ty; if(visited.has(key)) break; visited.add(key); const nb=lowestNeighbor(tx,ty); if(nb.tx===tx&&nb.ty===ty) break; tx=nb.tx; ty=nb.ty; } }
  for(let ty=1;ty<WORLD_SIZE-1;ty++){ for(let tx=1;tx<WORLD_SIZE-1;tx++){ const id=idxOf(tx,ty), f=flow[id]; if(f<60) continue; let w=1; if(f>220) w=2; if(f>520) w=3; for(let oy=-w;oy<=w;oy++){ for(let ox=-w;ox<=w;ox++){ const nx=tx+ox, ny=ty+oy; if(!inBounds(nx,ny)) continue; if(ox*ox+oy*oy>w*w) continue; const nid=idxOf(nx,ny); if(heightMap[nid]>.94) continue; riverMask[nid]=1; } } } }
  for(let i=0;i<tileMap.length;i++) if(riverMask[i]) tileMap[i]=T.WATER;
  for(let ty=1;ty<WORLD_SIZE-1;ty++){ for(let tx=1;tx<WORLD_SIZE-1;tx++){ const id=idxOf(tx,ty); if(tileMap[id]===T.WATER) continue; let nearWater=false; for(let oy=-1;oy<=1;oy++){ for(let ox=-1;ox<=1;ox++){ if(ox===0&&oy===0) continue; const nx=tx+ox, ny=ty+oy; if(!inBounds(nx,ny)) continue; if(tileMap[idxOf(nx,ny)]===T.WATER){ nearWater=true; break; } } if(nearWater) break; } if(nearWater && heightMap[id]<.34) tileMap[id]=T.SAND; } }
}
function pickCampfireSpot(){ let best={tx:WORLD_HALF,ty:WORLD_HALF,score:-1}; for(let tries=0;tries<2500;tries++){ const wx=(rng()*2-1)*40, wy=(rng()*2-1)*40, tx=worldToTile(wx), ty=worldToTile(wy); if(!inBounds(tx,ty)) continue; const id=idxOf(tx,ty), tt=tileMap[id]; if(tt===T.WATER) continue; const h=heightMap[id], m=moistMap[id]; let nearWater=0; for(let oy=-2;oy<=2;oy++){ for(let ox=-2;ox<=2;ox++){ const nx=tx+ox, ny=ty+oy; if(!inBounds(nx,ny)) continue; if(tileMap[idxOf(nx,ny)]===T.WATER) nearWater++; } } const score=(tt===T.GRASS?2:1)+(m*1.4)+(nearWater*.03)+(1-Math.abs(h-.55))*.6; if(score>best.score) best={tx,ty,score}; } campfire.x=tileToWorld(best.tx); campfire.y=tileToWorld(best.ty); }

function getServerLight(nowMs){ if(!serverMeta) return 1; if(serverMeta.dayMode==="dayForever") return 1; if(serverMeta.dayMode==="nightForever") return 0; const SWITCH_EVERY=180000, TRANSITION=12000, start=getTimestampMs(serverMeta.createdAt)||Date.now(), elapsed=Math.max(0,nowMs-start), phaseIndex=Math.floor(elapsed/SWITCH_EVERY), phaseTime=elapsed%SWITCH_EVERY, phaseIsNight=phaseIndex%2===1; if(phaseTime<TRANSITION){ const t=easeOutQuint(phaseTime/TRANSITION), from=phaseIsNight?1:0, to=phaseIsNight?0:1; return lerp(from,to,t); } return phaseIsNight?0:1; }
function updateServerInfo(){ if(!serverMeta){ serverInfoEl.textContent="Loading server..."; return; } const online=getIsFresh(serverMeta.lastHeartbeat,SERVER_TIMEOUT_MS); serverInfoEl.textContent=`${serverMeta.name||"Server"} • by ${serverMeta.createdByName||"Unknown"} • ${online?"Online":"Offline"} • Players: ${actualPlayersCount}/${serverMeta.maxPlayers||8}`; }
function getTargetTile(){ let tx,ty; if(!isCoarse&&mouseAim){ const ix=(mouseAim.x-view.ox)/view.scale, iy=(mouseAim.y-view.oy)/view.scale; if(ix>=0&&iy>=0&&ix<INTERNAL_W&&iy<INTERNAL_H){ const wx=(ix-INTERNAL_W/2)/PPU+camera.x, wy=(iy-INTERNAL_H/2)/PPU+camera.y; tx=worldToTile(wx); ty=worldToTile(wy); } } if(tx==null||ty==null){ const wx=player.x+Math.cos(player.dir)*2, wy=player.y+Math.sin(player.dir)*2; tx=worldToTile(wx); ty=worldToTile(wy); } if(!inBounds(tx,ty)) return null; return {tx,ty,tileId:idxOf(tx,ty)}; }
function getClaimForTile(tileId){ const tx=tileId%WORLD_SIZE, ty=(tileId/WORLD_SIZE)|0, {chunkX,chunkY}=getChunkFromTile(tx,ty); return claimsMap.get(claimKey(chunkX,chunkY))||null; }
function canModifyTile(tileId){ const claim=getClaimForTile(tileId); if(!claim) return {ok:true,reason:""}; if(claim.ownerUid===myUid) return {ok:true,reason:""}; if(claim.access==="sharedBuild") return {ok:true,reason:""}; return {ok:false, reason:`Claimed by ${claim.ownerName||"player"}`}; }
function canPlaceAt(tileId){ const tx=tileId%WORLD_SIZE, ty=(tileId/WORLD_SIZE)|0; if(!inBounds(tx,ty)) return false; if(tileMap[tileId]===T.WATER) return false; const cTx=worldToTile(campfire.x), cTy=worldToTile(campfire.y); if(tx===cTx && ty===cTy) return false; const wx=tileToWorld(tx), wy=tileToWorld(ty); if(buildMap.has(tileId)) return false; if(tileOccupiedByCollider(wx,wy,.48)) return false; return true; }

async function placeBuild(tileId){ const perm=canModifyTile(tileId); if(!perm.ok){ showToast(perm.reason,1.1); audio.beep(180,.10,.04); return false; } const cost=COST[buildType]||1; if(wood<cost){ showToast("Not enough wood",1); audio.beep(180,.10,.04); return false; } if(!canPlaceAt(tileId)){ showToast("Can't place here",1); audio.beep(180,.10,.04); return false; }
  wood-=cost; buildMap.set(tileId,{type:buildType,rot:buildRot}); if(buildType===BUILD.WALL||buildType===BUILD.WINDOW){ const tx=tileId%WORLD_SIZE, ty=(tileId/WORLD_SIZE)|0; addColliderRect(tileToWorld(tx),tileToWorld(ty),.48,.48,buildType===BUILD.WINDOW?"build_window":"build_wall"); }
  const tx=tileId%WORLD_SIZE, ty=(tileId/WORLD_SIZE)|0; spawnParticles("build",tileToWorld(tx),tileToWorld(ty),10); minimapDirty=true; audio.beep(560,.05,.04);
  try{ await setDoc(doc(db,"servers",serverId,"builds",String(tileId)), { tileId, type:buildType, rot:buildRot, updatedAt:serverTimestamp(), updatedBy:myUid }); }catch(e){ console.error(e); }
  return true; }

async function removeBuild(tileId){ const perm=canModifyTile(tileId); if(!perm.ok){ showToast(perm.reason,1.1); audio.beep(180,.10,.04); return false; } const b=buildMap.get(tileId); if(!b){ showToast("No block here",.7); audio.beep(180,.10,.04); return false; } const back=Math.max(1,Math.floor((COST[b.type]||1)*.5)); wood+=back; buildMap.delete(tileId); rebuildBuildColliders(); const tx=tileId%WORLD_SIZE, ty=(tileId/WORLD_SIZE)|0; spawnParticles("chips",tileToWorld(tx),tileToWorld(ty),8); showToast(`Removed (+${back} wood)`,.9); minimapDirty=true; audio.beep(320,.06,.04); try{ await deleteDoc(doc(db,"servers",serverId,"builds",String(tileId))); }catch(e){ console.error(e); } return true; }

async function chopNearestTree(){ let best=null, bestD=3.2*3.2; for(const t of trees){ if(t.removed) continue; const d=dist2(player.x,player.y,t.x,t.y); if(d<bestD){ bestD=d; best=t; } } if(!best) return; const perm=canModifyTile(best.tileId); if(!perm.ok){ showToast(perm.reason,1.1); audio.beep(180,.10,.04); return; } best.hp-=1; spawnParticles("chips",best.x,best.y,12); audio.beep(240,.05,.04); if(best.hp<=0){ best.removed=true; removedTrees.add(best.tileId); const i=colliders.indexOf(best.collider); if(i!==-1) colliders.splice(i,1); wood+=1; showToast("+1 wood",.7); minimapDirty=true; audio.beep(720,.04,.04); try{ await setDoc(doc(db,"servers",serverId,"removedTrees",String(best.tileId)), { tileId:best.tileId, removedAt:serverTimestamp(), removedBy:myUid }); }catch(e){ console.error(e); } } }
async function mineNearestBoulder(){ let best=null, bestD=3.3*3.3; for(const b of boulders){ if(b.removed) continue; const d=dist2(player.x,player.y,b.x,b.y); if(d<bestD){ bestD=d; best=b; } } if(!best) return; const perm=canModifyTile(best.tileId); if(!perm.ok){ showToast(perm.reason,1.1); audio.beep(180,.10,.04); return; } best.hp-=1; spawnParticles("chips",best.x,best.y,10); audio.beep(best.type==="coal"?520:680,.06,.04); if(best.hp<=0){ best.removed=true; removedBoulders.add(best.tileId); const i=colliders.indexOf(best.collider); if(i!==-1) colliders.splice(i,1); if(best.type==="coal"){ coal+=1; stone+=1; showToast("+coal +stone",.8); } else { stone+=1; showToast("+1 stone",.8); } minimapDirty=true; audio.beep(760,.04,.04); try{ await setDoc(doc(db,"servers",serverId,"removedBoulders",String(best.tileId)), { tileId:best.tileId, removedAt:serverTimestamp(), removedBy:myUid }); }catch(e){ console.error(e); } } }
async function claimTargetChunk(){ const tgt=getTargetTile(); if(!tgt) return; const {chunkX,chunkY}=getChunkFromTile(tgt.tx,tgt.ty), key=claimKey(chunkX,chunkY), existing=claimsMap.get(key); if(existing){ if(existing.ownerUid===myUid) showToast("This territory is already yours",1); else showToast(`Claimed by ${existing.ownerName||"player"}`,1.1); audio.beep(180,.10,.04); return; } try{ await setDoc(doc(db,"servers",serverId,"claims",key), { chunkX, chunkY, ownerUid:myUid, ownerName:myName, access:"visitOnly", createdAt:serverTimestamp(), updatedAt:serverTimestamp() }); showToast("Territory claimed (visitOnly)",1); minimapDirty=true; audio.beep(640,.08,.04); }catch(e){ console.error(e); } }
async function toggleClaimAccessAtTarget(){ const tgt=getTargetTile(); if(!tgt) return; const claim=getClaimForTile(tgt.tileId); if(!claim){ showToast("No claim here",.9); audio.beep(180,.10,.04); return; } if(claim.ownerUid!==myUid){ showToast("Only owner can edit claim",1); audio.beep(180,.10,.04); return; } const newAccess=claim.access==="sharedBuild"?"visitOnly":"sharedBuild"; try{ await updateDoc(doc(db,"servers",serverId,"claims",claimKey(claim.chunkX,claim.chunkY)), { access:newAccess, updatedAt:serverTimestamp() }); showToast(`Claim: ${newAccess}`,1); audio.beep(700,.05,.04); }catch(e){ console.error(e); } }
async function sendQuickChat(text){ if(!text||!myUid) return; const until=Date.now()+QUICK_CHAT_VISIBLE_MS; player.quickChatText=text; player.quickChatUntil=until; try{ await setDoc(doc(db,"servers",serverId,"players",myUid), { quickChatText:text, quickChatUntil:until, lastActive:serverTimestamp() }, { merge:true }); }catch(e){ console.error(e); } }
async function doAction(){ if(!canPlay||quickChatOpen) return; audio.resume(); if(claimPreviewActive){ await claimTargetChunk(); claimPreviewActive=false; return; } if(player.attackCooldown>0) return; player.attack=.0001; player.attackCooldown=.34; if(buildMode){ const tgt=getTargetTile(); if(!tgt) return; await placeBuild(tgt.tileId); return; } if(currentTool===TOOL.PICKAXE) await mineNearestBoulder(); else await chopNearestTree(); }
async function doRemoveAction(){ if(!canPlay||quickChatOpen) return; if(claimPreviewActive){ claimPreviewActive=false; showToast("Claim preview cancelled",.8); return; } if(!buildMode) return; const tgt=getTargetTile(); if(!tgt) return; await removeBuild(tgt.tileId); }
window.addEventListener("mousedown", async (e)=>{ if(e.button===0) await doAction(); if(e.button===2) await doRemoveAction(); });
window.addEventListener("contextmenu", e=>e.preventDefault());
if(actionBtn){ const tap=async (e)=>{ e.preventDefault(); await doAction(); }; actionBtn.addEventListener("click",tap); actionBtn.addEventListener("touchstart",tap,{passive:false}); }
const setMinimap = (v)=>{ minimapOn=v; miniWrap.style.display=minimapOn?"block":"none"; if(minimapOn) minimapDirty=true; };

window.addEventListener("keydown", async (e)=>{
  audio.resume();
  if(e.code==="Digit1"){ currentTool=TOOL.AXE; showToast("Tool: Axe",.8); audio.beep(700,.04,.04); }
  if(e.code==="Digit2"){ currentTool=TOOL.PICKAXE; showToast("Tool: Pickaxe",.8); audio.beep(700,.04,.04); }
  if(e.code==="KeyB"){ buildMode=!buildMode; if(buildMode) claimPreviewActive=false; showToast(buildMode?"Build mode ON":"Build mode OFF",.9); audio.beep(700,.04,.04); }
  if(e.code==="KeyM"){ setMinimap(!minimapOn); audio.beep(700,.04,.04); }
  if(e.code==="KeyV"&&!e.repeat){ claimPreviewActive=!claimPreviewActive; if(claimPreviewActive) buildMode=false; showToast(claimPreviewActive?"Claim preview ON":"Claim preview OFF",.9); audio.beep(700,.04,.04); }
  if(e.code==="KeyG") await toggleClaimAccessAtTarget();
  if(e.code==="KeyQ"&&!e.repeat) openQuickChat();
  if(e.code==="Escape"){ closeQuickChat(); claimPreviewActive=false; }
  if(buildMode){
    if(e.code==="Digit3"){ buildType=BUILD.FLOOR; showToast("Build: Floor",.8); }
    if(e.code==="Digit4"){ buildType=BUILD.WALL; showToast("Build: Wall",.8); }
    if(e.code==="Digit5"){ buildType=BUILD.DOOR; showToast("Build: Door",.8); }
    if(e.code==="Digit6"){ buildType=BUILD.WINDOW; showToast("Build: Window",.8); }
    if(e.code==="Digit7"){ buildType=BUILD.ROOF; showToast("Build: Roof",.8); }
    if(e.code==="KeyR"){ buildRot=(buildRot+1)&3; showToast("Rotate",.6); }
    if(e.code==="KeyX") await doRemoveAction();
  }
});
window.addEventListener("keyup", (e)=>{ if(e.code==="KeyQ") closeQuickChat(); });

async function safeSetServerPresence(force=false){ if(!serverMeta||!myUid) return; const now=performance.now(); if(!force && now-lastServerSyncAt<2500) return; lastServerSyncAt=now; try{ await updateDoc(doc(db,"servers",serverId), { lastHeartbeat:serverTimestamp(), playerCount:actualPlayersCount, status:actualPlayersCount>0?"online":"offline", updatedAt:serverTimestamp() }); }catch(e){ console.error(e); } }

async function leaveServer(){ if(leaveDone||!myUid||!joinedPresence) return; leaveDone=true; try{ await deleteDoc(doc(db,"servers",serverId,"players",myUid)); }catch(e){ console.error(e); }
  try{ const snap=await getDocs(query(collection(db,"servers",serverId,"players"))); let active=0; snap.forEach((d)=>{ const data=d.data(), ts=data?.lastActive?.toDate ? data.lastActive.toDate().getTime() : 0; if(ts && Date.now()-ts<PLAYER_TIMEOUT_MS) active++; }); await updateDoc(doc(db,"servers",serverId), { playerCount:active, status:active>0?"online":"offline", updatedAt:serverTimestamp(), lastHeartbeat:serverTimestamp() }); }catch(e){ console.error(e); }
}

async function writePlayerState(force=false){ if(!canPlay||!myUid||!joinedPresence) return; const now=performance.now(); const movedEnough=Math.abs(player.x-lastSentX)>.08 || Math.abs(player.y-lastSentY)>.08 || Math.abs(player.dir-lastSentDir)>.08; if(!force && !movedEnough && now-lastNetSendAt<150) return; lastNetSendAt=now; lastSentX=player.x; lastSentY=player.y; lastSentDir=player.dir; try{ await setDoc(doc(db,"servers",serverId,"players",myUid), { uid:myUid, name:myName, avatar:myAvatar||DEFAULT_AVATAR, x:player.x, y:player.y, dir:player.dir, tool:currentTool, quickChatText:player.quickChatText||"", quickChatUntil:player.quickChatUntil||0, lastActive:serverTimestamp(), joinedAt:serverTimestamp() }, { merge:true }); }catch(e){ console.error(e); } }

async function joinServer(user){ myUid=user.uid; myName=user.displayName||"Player"; player.name=myName; const userSnap=await getDoc(doc(db,"users",myUid)); myAvatar=userSnap.exists() ? (userSnap.data().avatar || DEFAULT_AVATAR) : DEFAULT_AVATAR; player.avatar=myAvatar;
  const serverSnap=await getDoc(doc(db,"servers",serverId)); if(!serverSnap.exists()) throw new Error("Server not found."); serverMeta={ id:serverSnap.id, ...serverSnap.data() };
  const isCreator=serverMeta.createdByUid===myUid, allowed=Array.isArray(serverMeta.allowedUsersNormalized)?serverMeta.allowedUsersNormalized:[], meNorm=normalizeName(myName); if(serverMeta.visibility==="private" && !isCreator && !allowed.includes(meNorm)) throw new Error("You are not allowed to join this private server.");
  const online=getIsFresh(serverMeta.lastHeartbeat,SERVER_TIMEOUT_MS); if(!isCreator && online && Number(serverMeta.playerCount||0)>=Number(serverMeta.maxPlayers||8)) throw new Error("Server is full.");
  if(!serverMeta.worldSeed){ const newSeed="pine-"+Date.now(); await updateDoc(doc(db,"servers",serverId), { worldSeed:newSeed }); serverMeta.worldSeed=newSeed; }
  setSeed(serverMeta.worldSeed); generateWorld(); player.x=campfire.x+1.4; player.y=campfire.y+1.2; camera.x=player.x; camera.y=player.y;
  await setDoc(doc(db,"servers",serverId,"players",myUid), { uid:myUid, name:myName, avatar:myAvatar||DEFAULT_AVATAR, x:player.x, y:player.y, dir:player.dir, tool:currentTool, quickChatText:"", quickChatUntil:0, lastActive:serverTimestamp(), joinedAt:serverTimestamp() });
  joinedPresence=true; canPlay=true; worldReady=true; loadingBox.style.display="none"; await safeSetServerPresence(true); updateServerInfo(); await writePlayerState(true);

  unsubServer = onSnapshot(doc(db,"servers",serverId), (snap)=>{ if(!snap.exists()){ showErr("Server was deleted."); return; } serverMeta={ id:snap.id, ...snap.data() }; updateServerInfo(); });
  unsubPlayers = onSnapshot(collection(db,"servers",serverId,"players"), (snapshot)=>{ remotePlayers=[]; actualPlayersCount=0; const seen=new Set(); snapshot.forEach((d)=>{ const data=d.data(); if(!getIsFresh(data?.lastActive,PLAYER_TIMEOUT_MS)) return; actualPlayersCount++; if(d.id===myUid) return; seen.add(d.id); const existing=remotePlayersMap.get(d.id) || { id:d.id, rx:data.x||0, ry:data.y||0, x:data.x||0, y:data.y||0, dir:data.dir||0, tool:data.tool??TOOL.AXE, name:data.name||"Player", avatar:data.avatar||DEFAULT_AVATAR, attack:0, quickChatText:"", quickChatUntil:0 };
    existing.x=data.x??existing.x; existing.y=data.y??existing.y; existing.dir=data.dir??existing.dir; existing.tool=data.tool??existing.tool; existing.name=data.name||existing.name; existing.avatar=data.avatar||existing.avatar; existing.quickChatText=data.quickChatText||""; existing.quickChatUntil=data.quickChatUntil||0; remotePlayersMap.set(d.id,existing); remotePlayers.push(existing); });
    for(const key of [...remotePlayersMap.keys()]) if(!seen.has(key)) remotePlayersMap.delete(key); updateServerInfo(); minimapDirty=true; });
  unsubBuilds = onSnapshot(collection(db,"servers",serverId,"builds"), (snapshot)=>{ buildMap=new Map(); snapshot.forEach((d)=>{ const data=d.data(); if(!data||typeof data.tileId!=="number") return; buildMap.set(data.tileId,{ type:data.type||BUILD.WALL, rot:(data.rot||0)&3 }); }); rebuildBuildColliders(); minimapDirty=true; });
  unsubRemovedTrees = onSnapshot(collection(db,"servers",serverId,"removedTrees"), (snapshot)=>{ removedTrees=new Set(); snapshot.forEach((d)=>{ const data=d.data(); if(typeof data.tileId === "number") removedTrees.add(data.tileId); }); applyRemovedTreeSet(); minimapDirty=true; });
  unsubRemovedBoulders = onSnapshot(collection(db,"servers",serverId,"removedBoulders"), (snapshot)=>{ removedBoulders=new Set(); snapshot.forEach((d)=>{ const data=d.data(); if(typeof data.tileId === "number") removedBoulders.add(data.tileId); }); applyRemovedBoulderSet(); minimapDirty=true; });
  unsubClaims = onSnapshot(collection(db,"servers",serverId,"claims"), (snapshot)=>{ claimsMap=new Map(); snapshot.forEach((d)=>{ const data=d.data(); if(!data) return; claimsMap.set(claimKey(Number(data.chunkX||0), Number(data.chunkY||0)), { chunkX:Number(data.chunkX||0), chunkY:Number(data.chunkY||0), ownerUid:data.ownerUid||"", ownerName:data.ownerName||"Player", access:data.access==="sharedBuild"?"sharedBuild":"visitOnly" }); }); minimapDirty=true; });
}

leaveBtn.addEventListener("click", async ()=>{ await leaveServer(); location.href="index.html"; });
window.addEventListener("pagehide", async ()=>{ try{ await leaveServer(); }catch{} });
window.addEventListener("beforeunload", async ()=>{ try{ await leaveServer(); }catch{} });

let last=performance.now();
function update(dt,timeSec){ if(!worldReady) return; let mx=0,my=0; if(keys["KeyW"]||keys["ArrowUp"]) my-=1; if(keys["KeyS"]||keys["ArrowDown"]) my+=1; if(keys["KeyA"]||keys["ArrowLeft"]) mx-=1; if(keys["KeyD"]||keys["ArrowRight"]) mx+=1; if(Math.abs(touchMoveX)>.05||Math.abs(touchMoveY)>.05){ mx+=touchMoveX; my+=touchMoveY; } const len=Math.hypot(mx,my);
  if(!isCoarse&&mouseAim){ const cx=innerWidth/2, cy=innerHeight/2, dx=mouseAim.x-cx, dy=mouseAim.y-cy; if(Math.hypot(dx,dy)>6) player.dir=Math.atan2(dy,dx); } else if(len>.001) player.dir=Math.atan2(my,mx);
  const speed=7.8; if(len>.001){ const nx=clamp(player.x+(mx/Math.max(1,len))*speed*dt,-WORLD_HALF+1,WORLD_HALF-1); if(!isBlocked(nx,player.y,player.r)) player.x=nx; const ny=clamp(player.y+(my/Math.max(1,len))*speed*dt,-WORLD_HALF+1,WORLD_HALF-1); if(!isBlocked(player.x,ny,player.r)) player.y=ny; }
  const tx=worldToTile(player.x), ty=worldToTile(player.y); if(inBounds(tx,ty)&&tileMap[idxOf(tx,ty)]===T.WATER){ player.x+=Math.cos(player.dir+Math.PI)*.12; player.y+=Math.sin(player.dir+Math.PI)*.12; }
  if(player.attackCooldown>0) player.attackCooldown-=dt; if(player.attack>0){ player.attack+=dt*3.2; if(player.attack>=1) player.attack=0; }
  if(player.quickChatUntil && Date.now()>player.quickChatUntil){ player.quickChatUntil=0; player.quickChatText=""; }
  for(const pt of particles){ pt.life-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vx*=.90; pt.vy*=.90; if(pt.type==="chips") pt.vy+=6.5*dt; if(pt.type==="build") pt.vy-=1.5*dt; } for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);
  if(toast.t>0) toast.t-=dt; for(const rp of remotePlayers){ rp.rx=lerp(rp.rx??rp.x,rp.x,.18); rp.ry=lerp(rp.ry??rp.y,rp.y,.18); }
  camera.x=lerp(camera.x,player.x,.12); camera.y=lerp(camera.y,player.y,.12);
  const now=performance.now(); if(now-lastHeartbeatAt>3000){ lastHeartbeatAt=now; writePlayerState(true); safeSetServerPresence(true); } else writePlayerState(false);
  minimapTimer+=dt; if(minimapOn&&(minimapDirty||minimapTimer>=.35)){ minimapTimer=0; minimapDirty=false; updateMinimap(); }
  hudEl.innerHTML = `Wood: ${wood} | Stone: ${stone} | Coal: ${coal}<div class="small">Tool: ${currentTool===TOOL.PICKAXE?"Pickaxe":"Axe"} | Build: ${buildMode?"ON":"OFF"} | Players here: ${actualPlayersCount}${buildMode?` | Block: ${buildType.toUpperCase()} (3-7)`:` | Axe=1 Pickaxe=2`} | Remove: X / Right Click | Minimap: M | Quick chat: hold Q | Claim: V | Claim access: G</div>`;
}
function render(timeSec){ if(!worldReady) return; const light=getServerLight(Date.now()); bctx.clearRect(0,0,INTERNAL_W,INTERNAL_H); drawTerrain(bctx,timeSec,light); for(const b of boulders){ if(b.removed) continue; if(Math.abs(b.x-camera.x)<28&&Math.abs(b.y-camera.y)<18) drawBoulder(bctx,b,light); } drawClaimsOverlay(bctx); drawBuilds(bctx,light); for(const t of trees){ if(t.removed) continue; if(Math.abs(t.x-camera.x)<28&&Math.abs(t.y-camera.y)<18) drawTree(bctx,t,timeSec,light); } drawCampfire(bctx,timeSec,light); for(const pt of particles){ const p=worldToScreen(pt.x,pt.y), a=clamp(pt.life/.75,0,1); bctx.fillStyle=pt.type==="chips"?rgba(190,120,70,.85*a):rgba(120,255,170,.65*a); bctx.fillRect((p.x|0),(p.y|0),2,2); } drawBuildGhost(bctx); drawClaimPreview(bctx); for(const rp of remotePlayers) drawPlayerEntity(bctx,rp,timeSec,true); drawPlayerEntity(bctx,player,timeSec,false); drawToast(bctx); const night=1-light; if(night>.001){ bctx.fillStyle=rgba(10,20,40,.10+.55*night); bctx.fillRect(0,0,INTERNAL_W,INTERNAL_H); const starA=.10*night; if(starA>.01){ bctx.fillStyle=rgba(220,240,255,starA); for(let i=0;i<24;i++){ const sx=(hash2(i,7,seedU32+60001)*INTERNAL_W)|0, sy=(hash2(i,13,seedU32+60007)*120)|0; bctx.fillRect(sx,sy,1,1); } } }
  const screenW=innerWidth, screenH=innerHeight, scale=Math.max(1,Math.floor(Math.min(screenW/INTERNAL_W,screenH/INTERNAL_H))), drawW=INTERNAL_W*scale, drawH=INTERNAL_H*scale, ox=((screenW-drawW)/2)|0, oy=((screenH-drawH)/2)|0; view.scale=scale; view.ox=ox; view.oy=oy; gctx.clearRect(0,0,screenW,screenH); gctx.imageSmoothingEnabled=false; gctx.drawImage(buffer,0,0,INTERNAL_W,INTERNAL_H,ox,oy,drawW,drawH); }
function loop(now){ const dt=Math.min(.033,(now-last)/1000); last=now; const timeSec=now/1000; update(dt,timeSec); render(timeSec); requestAnimationFrame(loop); }

resize(); window.addEventListener("resize", resize);
onAuthStateChanged(auth, async (user)=>{ try{ if(!user||!user.displayName){ loadingBox.textContent="Please sign in first."; showErr("You must be signed in to play multiplayer."); return; } await joinServer(user); requestAnimationFrame(loop); }catch(e){ console.error(e); showErr(e.message||e); loadingBox.textContent=e.message||"Failed to join server."; } });
</script>
