    function subscribeServerData() {
      unsubServer = onSnapshot(doc(db, "servers", serverId), (snap) => {
        if (!snap.exists()) throw new Error("Server not found.");
        serverMeta = { id: snap.id, ...snap.data() };
        paletteToggleBtn.style.display = hasAdvancedBuilderAccess() ? "inline-block" : "none";
        if (!hasAdvancedBuilderAccess()) closePalette();
        if (!hasAxeAccess() && currentTool === TOOL.AXE) currentTool = TOOL.PICKAXE;
        updateServerInfo();
      });

      unsubPlayers = onSnapshot(collection(db, "servers", serverId, "players"), (snap) => {
        const docs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        actualPlayersCount = docs.filter((p) => {
          const last = p.lastActive?.toDate ? p.lastActive.toDate().getTime() : 0;
          return last && Date.now() - last < PLAYER_TIMEOUT_MS;
        }).length;
        remotePlayers = [];
        docs.forEach((p) => {
          const last = p.lastActive?.toDate ? p.lastActive.toDate().getTime() : 0;
          if (!last || Date.now() - last >= PLAYER_TIMEOUT_MS) return;
          if (p.id === myUid) return;
          const prev = remotePlayersMap.get(p.id);
          const obj = {
            id: p.id,
            name: p.name || "Player",
            avatar: p.avatar || DEFAULT_AVATAR,
            x: Number(p.x || 0), y: Number(p.y || 0), dir: Number(p.dir || 0),
            rx: prev ? lerp(prev.rx ?? prev.x, Number(p.x || 0), 0.55) : Number(p.x || 0),
            ry: prev ? lerp(prev.ry ?? prev.y, Number(p.y || 0), 0.55) : Number(p.y || 0),
            tool: Number.isFinite(p.tool) ? p.tool : TOOL.AXE,
            attack: 0,
            isCreative: !!p.isCreative,
            quickChatText: p.quickChatText || "",
            quickChatUntil: Number(p.quickChatUntil || 0),
          };
          remotePlayersMap.set(p.id, obj);
          remotePlayers.push(obj);
        });
        syncServerPresence();
        updateServerInfo();
        minimapDirty = true;
      });

      unsubBuilds = onSnapshot(collection(db, "servers", serverId, "builds"), (snap) => {
        terrainLayerMap = new Map();
        structureLayerMap = new Map();
        objectLayerMap = new Map();
        snap.forEach((d) => {
          const v = d.data();
          const tileId = Number(v.tileId);
          const entry = { type: v.type, rot: Number(v.rot || 0) & 3 };
          if (v.layer === "terrain") terrainLayerMap.set(tileId, entry);
          else if (v.layer === "object") objectLayerMap.set(tileId, entry);
          else structureLayerMap.set(tileId, entry);
        });
        rebuildBuildColliders();
        minimapDirty = true;
      });

      unsubRemovedTrees = onSnapshot(collection(db, "servers", serverId, "removedTrees"), (snap) => {
        removedTrees = new Set();
        snap.forEach((d) => removedTrees.add(Number(d.data().tileId)));
        applyRemovedTreeSet();
        minimapDirty = true;
      });

      unsubRemovedBoulders = onSnapshot(collection(db, "servers", serverId, "removedBoulders"), (snap) => {
        removedBoulders = new Set();
        snap.forEach((d) => removedBoulders.add(Number(d.data().tileId)));
        applyRemovedBoulderSet();
        minimapDirty = true;
      });

      unsubClaims = onSnapshot(collection(db, "servers", serverId, "claims"), (snap) => {
        claimsMap = new Map();
        snap.forEach((d) => {
          const v = d.data();
          claimsMap.set(d.id, {
            chunkX: Number(v.chunkX),
            chunkY: Number(v.chunkY),
            ownerUid: v.ownerUid,
            ownerName: v.ownerName,
            access: v.access || "visitOnly",
          });
        });
        minimapDirty = true;
      });
    }

    async function ensureServerAccess(user) {
      const serverSnap = await getDoc(doc(db, "servers", serverId));
      if (!serverSnap.exists()) throw new Error("Server not found.");
      serverMeta = { id: serverSnap.id, ...serverSnap.data() };
      myUid = user.uid;
      myName = await resolveUserName(user);
      player.name = myName;
      await setDoc(doc(db, "users", myUid), { name: myName, lastActive: serverTimestamp() }, { merge: true });
      try {
        const meSnap = await getDoc(doc(db, "users", myUid));
        if (meSnap.exists()) {
          myAvatar = meSnap.data().avatar || DEFAULT_AVATAR;
          player.avatar = myAvatar;
        }
      } catch (e) { console.error("load my avatar error:", e); }

      if (serverMeta.visibility === "private") {
        const allowed = Array.isArray(serverMeta.allowedUsersNormalized) ? serverMeta.allowedUsersNormalized : [];
        const me = normalizeName(myName);
        if (serverMeta.createdByUid !== myUid && !allowed.includes(me)) throw new Error("This is a private server.");
      }

      if (!hasAxeAccess() && currentTool === TOOL.AXE) currentTool = TOOL.PICKAXE;
      paletteToggleBtn.style.display = hasAdvancedBuilderAccess() ? "inline-block" : "none";
    }

    async function joinServer(user) {
      await ensureServerAccess(user);
      if (!serverMeta.worldSeed) throw new Error("Server seed is missing.");
      setSeed(serverMeta.worldSeed);
      generateWorld();
      player.x = campfire.x + 1.4;
      player.y = campfire.y + 1.2;
      player.dir = 0;
      camera.x = player.x;
      camera.y = player.y;
      await setDoc(doc(db, "servers", serverId, "players", myUid), {
        uid: myUid,
        name: myName,
        avatar: myAvatar || DEFAULT_AVATAR,
        x: player.x,
        y: player.y,
        dir: player.dir,
        tool: currentTool,
        isCreative: isCreativeForMe(),
        quickChatText: "",
        quickChatUntil: 0,
        joinedAt: serverTimestamp(),
        lastActive: serverTimestamp(),
      }, { merge: true });
      joinedPresence = true;
      canPlay = true;
      worldReady = true;
      loadingBox.style.display = "none";
      subscribeServerData();
      await syncServerPresence(true);
      await syncMyPlayer(true);
    }

    async function leaveServer() {
      if (leaveDone) return;
      leaveDone = true;
      try {
        if (myUid && joinedPresence) await deleteDoc(doc(db, "servers", serverId, "players", myUid));
      } catch (e) { console.error("leaveServer delete player error:", e); }
      try {
        if (myUid) await updateDoc(doc(db, "servers", serverId), { updatedAt: serverTimestamp() });
      } catch (e) { console.error("leaveServer update server error:", e); }
    }

    leaveBtn.addEventListener("click", async () => {
      try { await leaveServer(); } catch {}
      location.href = "index.html";
    });
    window.addEventListener("pagehide", () => leaveServer());
    window.addEventListener("beforeunload", () => leaveServer());

    function handleTeleportPads() {
      const now = Date.now();
      if (now - lastTeleportAt < TELEPORT_COOLDOWN_MS) return;
      const tileId = idxOf(worldToTile(player.x), worldToTile(player.y));
      const obj = getObjectEntry(tileId);
      if (obj?.type === "teleporter_spawn") {
        player.x = campfire.x + 1.0;
        player.y = campfire.y + 1.0;
        camera.x = player.x;
        camera.y = player.y;
        lastTeleportAt = now;
        showToast("Teleported to spawn", 0.9);
        audio.beep(760, 0.08, 0.04);
      }
    }

    let last = performance.now();

    function update(dt, time) {
      if (!worldReady) return;
      let mx = 0, my = 0;
      if (keys["KeyW"] || keys["ArrowUp"]) my -= 1;
      if (keys["KeyS"] || keys["ArrowDown"]) my += 1;
      if (keys["KeyA"] || keys["ArrowLeft"]) mx -= 1;
      if (keys["KeyD"] || keys["ArrowRight"]) mx += 1;
      if (Math.abs(touchMoveX) > 0.05 || Math.abs(touchMoveY) > 0.05) {
        mx += touchMoveX;
        my += touchMoveY;
      }
      const len = Math.hypot(mx, my);
      if (!isCoarse && mouseAim) {
        const cx = innerWidth / 2;
        const cy = innerHeight / 2;
        const dx = mouseAim.x - cx;
        const dy = mouseAim.y - cy;
        if (Math.hypot(dx, dy) > 6) player.dir = Math.atan2(dy, dx);
      } else if (len > 0.001) {
        player.dir = Math.atan2(my, mx);
      }
      const speed = isCreativeForMe() ? 9.0 : hasAdvancedBuilderAccess() ? 8.5 : 7.8;
      if (len > 0.001) {
        const nx = clamp(player.x + (mx / Math.max(1, len)) * speed * dt, -WORLD_HALF + 1, WORLD_HALF - 1);
        if (!isBlocked(nx, player.y, player.r)) player.x = nx;
        const ny = clamp(player.y + (my / Math.max(1, len)) * speed * dt, -WORLD_HALF + 1, WORLD_HALF - 1);
        if (!isBlocked(player.x, ny, player.r)) player.y = ny;
      }

      const tileId = idxOf(worldToTile(player.x), worldToTile(player.y));
      if (isWaterTile(tileId) && !isCreativeForMe()) {
        player.x += Math.cos(player.dir + Math.PI) * 0.12;
        player.y += Math.sin(player.dir + Math.PI) * 0.12;
      }

      handleTeleportPads();

      if (player.attackCooldown > 0) player.attackCooldown -= dt;
      if (player.attack > 0) {
        player.attack += dt * 3.2;
        if (player.attack >= 1) player.attack = 0;
      }

      for (const pt of particles) {
        pt.life -= dt;
        pt.x += pt.vx * dt;
        pt.y += pt.vy * dt;
        pt.vx *= 0.90;
        pt.vy *= 0.90;
        if (pt.type === "chips") pt.vy += 6.5 * dt;
        if (pt.type === "build") pt.vy -= 1.5 * dt;
      }
      for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);
      if (toast.t > 0) toast.t -= dt;

      camera.x = lerp(camera.x, player.x, 0.12);
      camera.y = lerp(camera.y, player.y, 0.12);

      minimapTimer += dt;
      if (minimapOn && (minimapDirty || minimapTimer >= 0.35)) {
        minimapTimer = 0;
        minimapDirty = false;
        updateMinimap();
      }

      syncMyPlayer(false);
      heartbeat();
      updateServerInfo();

      const creative = isCreativeForMe();
      const adv = hasAdvancedBuilderAccess();
      const woodText = isFreeBuildForMe() ? "∞" : wood;
      const stoneText = isFreeBuildForMe() ? "∞" : stone;
      const coalText = isFreeBuildForMe() ? "∞" : coal;

      hudEl.innerHTML =
        `Wood: ${woodText} | Stone: ${stoneText} | Coal: ${coalText}` +
        `<div class="small">Mode: ${creative ? "Creative" : adv ? "Builder+" : "Survival"} | Tool: ${currentTool === TOOL.PICKAXE ? "Pickaxe" : "Axe"} | Build: ${buildMode ? "ON" : "OFF"}` +
        ` | Selected: ${selectedBuild.label}` +
        ` | Claims: ${claimsAreEnabled() ? "ON" : "OFF"}` +
        ` | Break: ${canBreakServerWide() ? "Yes" : "No"}` +
        ` | Minimap: M | Palette: P | Quick Chat: Q | Claim Preview: V` +
        `</div>`;
    }

    function render(time) {
      const light = getServerLight(Date.now());
      bctx.clearRect(0, 0, INTERNAL_W, INTERNAL_H);
      drawTerrain(bctx, time, light);

      for (const b of boulders) {
        if (b.removed || getObjectEntry(b.tileId)) continue;
        const dx = Math.abs(b.x - camera.x);
        const dy = Math.abs(b.y - camera.y);
        if (dx < 28 && dy < 18) drawBoulder(bctx, b, light);
      }

      drawStructureLayer(bctx, light, time);

      for (const t of trees) {
        if (t.removed || getObjectEntry(t.tileId)) continue;
        const dx = Math.abs(t.x - camera.x);
        const dy = Math.abs(t.y - camera.y);
        if (dx < 28 && dy < 18) drawNaturalTree(bctx, t, time, light);
      }

      if (!isCampfireRemoved()) drawCampfire(bctx, campfire.x, campfire.y, time, light, true);
      drawObjectLayer(bctx, light, time);
      drawClaimsOverlay(bctx);
      drawBuildGhost(bctx);
      drawClaimPreview(bctx);

      for (const rp of remotePlayers) drawPlayerEntity(bctx, rp, time, true);
      drawPlayerEntity(bctx, { ...player, isCreative: isCreativeForMe() }, time, false);

      for (const pt of particles) {
        const p = worldToScreen(pt.x, pt.y);
        const a = clamp(pt.life / 0.75, 0, 1);
        bctx.fillStyle = pt.type === "chips" ? rgba(190,120,70,0.85 * a) : rgba(120,255,170,0.65 * a);
        bctx.fillRect((p.x | 0), (p.y | 0), 2, 2);
      }

      drawToast(bctx);

      const night = 1 - light;
      if (night > 0.001) {
        bctx.fillStyle = rgba(10, 20, 40, 0.10 + 0.55 * night);
        bctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);
      }

      const { drawW, drawH, ox, oy } = setupScreenView();
      gctx.clearRect(0, 0, innerWidth, innerHeight);
      gctx.imageSmoothingEnabled = false;
      gctx.drawImage(buffer, 0, 0, INTERNAL_W, INTERNAL_H, ox, oy, drawW, drawH);
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      const time = now / 1000;
      update(dt, time);
      render(time);
      requestAnimationFrame(loop);
    }

    resize();
    window.addEventListener("resize", resize);

    window.addEventListener("keydown", async (e) => {
      audio.resume();
      if (e.code === "Digit1") {
        if (!hasAxeAccess()) {
          showToast("This server disabled axe", 1.0);
          audio.beep(180, 0.10, 0.04);
        } else {
          currentTool = TOOL.AXE;
          showToast("Tool: Axe", 0.8);
          audio.beep(700, 0.04, 0.04);
        }
      }
      if (e.code === "Digit2") {
        currentTool = TOOL.PICKAXE;
        showToast("Tool: Pickaxe", 0.8);
        audio.beep(700, 0.04, 0.04);
      }
      if (e.code === "KeyB") {
        buildMode = !buildMode;
        if (buildMode) claimPreviewActive = false;
        showToast(buildMode ? `Build mode ON (${selectedBuild.label})` : "Build mode OFF", 0.9);
        audio.beep(700, 0.04, 0.04);
      }
      if (e.code === "KeyM") {
        setMinimap(!minimapOn);
        audio.beep(700, 0.04, 0.04);
      }
      if (e.code === "KeyP" && !e.repeat) {
        togglePalette();
        audio.beep(700, 0.04, 0.04);
      }
      if (e.code === "KeyV" && !e.repeat) {
        if (!claimsAreEnabled()) {
          showToast("Claims are disabled on this server", 1.0);
          audio.beep(180, 0.10, 0.04);
        } else {
          claimPreviewActive = !claimPreviewActive;
          if (claimPreviewActive) buildMode = false;
          showToast(claimPreviewActive ? "Claim preview ON" : "Claim preview OFF", 0.9);
          audio.beep(700, 0.04, 0.04);
        }
      }
      if (e.code === "KeyG") await toggleClaimAccessAtTarget();
      if (e.code === "KeyQ" && !e.repeat) openQuickChat();
      if (e.code === "Escape") {
        closeQuickChat();
        claimPreviewActive = false;
        closePalette();
      }
      if (e.code === "Digit3") { applySelectedPalette("floor"); if (buildMode) showToast("Build: Floor", 0.8); }
      if (e.code === "Digit4") { applySelectedPalette("wall"); if (buildMode) showToast("Build: Wall", 0.8); }
      if (e.code === "Digit5") { applySelectedPalette("door"); if (buildMode) showToast("Build: Door", 0.8); }
      if (e.code === "Digit6") { applySelectedPalette("window"); if (buildMode) showToast("Build: Window", 0.8); }
      if (e.code === "Digit7") { applySelectedPalette("roof"); if (buildMode) showToast("Build: Roof", 0.8); }
      if (buildMode && e.code === "KeyR") {
        selectedBuild.rot = ((selectedBuild.rot || 0) + 1) & 3;
        showToast("Rotate", 0.6);
      }
      if (buildMode && e.code === "KeyX") await doRemoveAction();
    });

    onAuthStateChanged(auth, async (user) => {
      try {
        if (!user) {
          loadingBox.textContent = "Please sign in first.";
          showErr("You must be signed in to play multiplayer.");
          return;
        }
        await joinServer(user);
        requestAnimationFrame(loop);
      } catch (e) {
        console.error(e);
        showErr(e.message || e);
        loadingBox.textContent = e.message || "Failed to join server.";
      }
    });
  </script>
</body>
</html>
